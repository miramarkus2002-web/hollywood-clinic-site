<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Treatment details at Hollywood Clinic Cairo.">
  <meta name="theme-color" content="#0B1D3A">
  <title>Treatment — Hollywood Clinic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/main.css">
  <style>
    .tx-hero{display:grid;gap:2.5rem;align-items:center;grid-template-columns:1fr;max-width:1100px;margin:0 auto}
    @media(min-width:900px){.tx-hero{grid-template-columns:1.1fr 1fr;gap:3.5rem}}
    .tx-photo{aspect-ratio:4/3;border-radius:1.5rem;overflow:hidden;box-shadow:0 30px 60px -20px rgba(11,29,58,.25);background:#e8edf4}
    .tx-photo img{width:100%;height:100%;object-fit:cover;display:block}
    .tx-info h1{font-size:clamp(1.9rem,4.5vw,2.6rem);margin:.5rem 0 .75rem}
  </style>
</head>
<body>
 <!--NAV-->

 <section class="section" style="padding-top:7rem;background:linear-gradient(180deg,#DEE7F1 0%,#F0F5FB 100%)">
 <div class="container">
 <div class="breadcrumb" style="justify-content:flex-start;margin-bottom:2rem;color:var(--muted)">
 <a href="../index.html" data-i18n="nav.home">Home</a>
 <span style="margin:0.5rem">/</span>
 <a id="txCatLink" href="../index.html#treatments">Treatments</a>
 <span style="margin:0.5rem">/</span>
 <span id="txCrumb"></span>
 </div>
 <div class="tx-hero">
 <div class="tx-photo fade-up"><img id="txPhoto" src="" alt=""></div>
 <div class="tx-info fade-up d1">
 <p class="eyebrow" id="txEyebrow"></p>
 <h1 id="txName"></h1>
 <p id="txTagline" style="font-size:1.0625rem;color:var(--body);line-height:1.7"></p>
 <div style="margin-top:1.5rem">
 <a href="../booking.html" class="btn btn-primary" id="txBook">Book a Consultation</a>
 </div>
 </div>
 </div>
 </div>
 </section>

 <section class="section bg-cream" id="txDescSec" style="display:none">
 <div class="container" style="max-width:820px">
 <div class="text-center mb-14">
 <div class="lux-line"></div>
 <p class="eyebrow" id="txAboutEyebrow">About this treatment</p>
 <h2 class="section-title" id="txDescTitle"></h2>
 </div>
 <div id="txDesc"></div>
 </div>
 </section>

 <!--FOOTER-->

 <script src="../assets/js/i18n.js"></script>
 <script src="../assets/js/main.js"></script>
 <script src="../assets/js/supabase-config.js"></script>
 <script>
  (function(){
    'use strict';
    function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
    function lang(){ return (window.I18N&&window.I18N.current&&window.I18N.current())||'en'; }
    function resolveImg(u){ if(u && !/^https?:|^\//.test(u)) u='../'+u; return u; }
    function pick(en,ar){ return (lang()==='ar'&&ar)?ar:(en||''); }
    var slug=new URLSearchParams(location.search).get('slug');
    var T=null;
    function render(){
      if(!T){ document.getElementById('txName').textContent='Treatment not found'; return; }
      var ar=lang()==='ar';
      var name=pick(T.name_en,T.name_ar);
      document.getElementById('txPhoto').src=resolveImg(T.image_url||'');
      document.getElementById('txPhoto').alt=name;
      document.getElementById('txEyebrow').textContent=(T.category||'').replace(/-/g,' ');
      document.getElementById('txName').textContent=name;
      document.getElementById('txCrumb').textContent=name;
      document.title=name+' — Hollywood Clinic';
      document.getElementById('txBook').textContent=ar?'احجزي استشارة':'Book a Consultation';
      document.getElementById('txAboutEyebrow').textContent=ar?'عن العلاج':'About this treatment';
      if(T.category) document.getElementById('txCatLink').href='../treatments/'+T.category+'.html';
      var tag=pick(T.tagline_en,T.tagline_ar);
      var tagEl=document.getElementById('txTagline'); tagEl.textContent=tag; tagEl.style.display=tag?'':'none';
      var desc=pick(T.description_en,T.description_ar);
      if(desc){ document.getElementById('txDescSec').style.display='';
        document.getElementById('txDescTitle').textContent=name;
        document.getElementById('txDesc').innerHTML=desc.split(/\n\s*\n|\r?\n/).map(function(p){return p.trim();}).filter(Boolean)
          .map(function(p){return '<p style="font-size:1.0625rem;line-height:1.85;color:var(--body);margin-bottom:1.1rem">'+esc(p)+'</p>';}).join('');
      } else { document.getElementById('txDescSec').style.display='none'; }
    }
    function load(){
      if(!slug){ render(); return; }
      if(!(window.HC&&window.HC.db)) return;
      window.HC.db.from('treatments').select('*').eq('slug',slug).limit(1).then(function(r){
        if(r.error||!r.data||!r.data.length){ T=null; render(); return; }
        T=r.data[0]; render();
      });
    }
    if(window.HC&&window.HC.db) load();
    document.addEventListener('hc:db-ready', load);
    document.addEventListener('i18n:applied', function(){ if(T) render(); });
  })();
  </script>
</body>
</html>
