<style>
:root{
  --navy:#0B1D3A; --navy-soft:#14284a; --navy-2:#0e2444;
  --gold:#C9A84C; --gold-soft:#e2c979;
  --cream:#FAFBFD; --mist:#EEF2F7; --mist-2:#F4F6FA;
  --ink:#4A5568; --muted:#8896A6; --line:#E2E7EF; --white:#fff;
  --serif:'Playfair Display',Georgia,serif; --sans:'Inter',system-ui,sans-serif;
  --shadow:0 18px 50px -20px rgba(11,29,58,.28); --shadow-sm:0 6px 22px -12px rgba(11,29,58,.30);
  --nav-h:87px;
}
/* Offset content below the shared fixed site nav + tune the shared footer to 4 columns */
body{padding-top:var(--nav-h)}
.stage{scroll-margin-top:calc(var(--nav-h) + 12px)}
@media(max-width:1023px){:root{--nav-h:67px}}
.footer .footer-grid{grid-template-columns:1fr}
@media(min-width:768px){.footer .footer-grid{grid-template-columns:1fr 1fr}}
@media(min-width:1024px){.footer .footer-grid{grid-template-columns:1.4fr 1fr 1fr 1.2fr}}
html[dir="rtl"]{ --sans:'Tajawal',system-ui,sans-serif; --serif:'Tajawal',serif; }
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);color:var(--ink);background:var(--cream);-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

/* NAV: uses the shared Hollywood site header (main.css + i18n.js) */

/* ---------------- QUIZ SHELL ---------------- */
.shell{display:grid;grid-template-columns:360px 1fr;min-height:calc(100vh - var(--nav-h));
  background:radial-gradient(900px 520px at 88% -12%, rgba(201,168,76,.07), transparent 60%), linear-gradient(180deg,#FFFFFF 0%, var(--cream) 55%, #F1F4F8 100%)}
.rail{background:linear-gradient(180deg,var(--navy) 0%, var(--navy-2) 100%);color:#fff;
  padding:46px 38px;display:flex;flex-direction:column;position:relative;overflow:hidden}
.rail::after{content:"";position:absolute;inset:auto -70px -90px auto;width:280px;height:280px;
  background:radial-gradient(circle,rgba(201,168,76,.20),transparent 70%)}
.rail .eyebrow-r{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:16px}
.rail h2{font-family:var(--serif);font-size:29px;line-height:1.2;font-weight:600;margin-bottom:14px}
.rail h2 em{font-style:italic;color:var(--gold-soft)}
.rail .lede{font-size:14.5px;line-height:1.65;color:#c6d2e6;max-width:280px}
.rail-progress{margin-top:34px}
.rail-progress .lbl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#9fb0cc;margin-bottom:11px}
.bar{height:5px;border-radius:99px;background:rgba(255,255,255,.14);overflow:hidden}
.bar>i{display:block;height:100%;width:12%;border-radius:99px;background:linear-gradient(90deg,var(--gold),var(--gold-soft));transition:width .5s cubic-bezier(.4,0,.2,1)}
.rail-progress .cnt{font-size:12.5px;color:#c6d2e6;margin-top:11px}
.trust{margin-top:auto;position:relative;z-index:1}
.trust .rating{display:flex;align-items:baseline;gap:9px;margin-bottom:16px}
.trust .rating b{font-family:var(--serif);font-size:29px;color:var(--gold-soft)}
.trust .rating .st{color:var(--gold);letter-spacing:2px;font-size:13px}
.trust .rating small{color:#9fb0cc;font-size:12px}
.trust ul{list-style:none;display:flex;flex-direction:column;gap:10px}
.trust li{display:flex;align-items:center;gap:10px;font-size:13.5px;color:#e4ebf6}
.trust li svg{flex:none;color:var(--gold)}

.stage{display:flex;align-items:center;justify-content:center;padding:52px 40px}
.qz-card{width:100%;max-width:660px}
.qz-eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:11px;letter-spacing:3px;
  text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:16px}
.qz-eyebrow::before{content:"";width:26px;height:1px;background:var(--gold)}
.q{font-family:var(--serif);font-size:clamp(26px,3.6vw,38px);line-height:1.16;color:var(--navy);font-weight:600;margin-bottom:11px}
.q em{font-style:italic;color:var(--gold)}
.sub{color:var(--muted);font-size:15px;line-height:1.6;margin-bottom:28px;max-width:82%}

.options{display:grid;gap:13px}
.options.two{grid-template-columns:1fr 1fr}
.opt{display:flex;align-items:center;gap:15px;background:var(--white);border:1.5px solid var(--line);
  border-radius:15px;padding:17px 19px;cursor:pointer;text-align:start;width:100%;font-family:var(--sans);
  color:var(--ink);transition:border-color .18s,box-shadow .18s,transform .18s;position:relative}
.opt:hover{border-color:var(--gold-soft);box-shadow:var(--shadow-sm);transform:translateY(-2px)}
.opt.sel{border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.18)}
.opt .ic{width:44px;height:44px;flex:none;border-radius:11px;background:var(--mist);display:grid;place-items:center;color:var(--navy)}
.opt.sel .ic{background:var(--gold);color:#fff}
.opt .txt b{display:block;font-size:15.5px;font-weight:600;color:var(--navy);margin-bottom:2px}
.opt .txt span{font-size:12.5px;color:var(--muted);line-height:1.4}
.opt .chk{margin-inline-start:auto;width:22px;height:22px;border-radius:50%;border:1.5px solid var(--line);
  display:grid;place-items:center;flex:none;color:#fff}
.opt.sel .chk{background:var(--gold);border-color:var(--gold)}
.opt .chk svg{opacity:0;transition:opacity .15s}
.opt.sel .chk svg{opacity:1}
.opt .tag{margin-inline-start:auto;font-size:11px;font-weight:600;color:var(--gold);
  background:rgba(201,168,76,.12);padding:4px 10px;border-radius:99px}
.opt.sel .tag{background:var(--gold);color:#fff}
.opt.rec{border-color:var(--gold-soft)}

.general-link{margin-top:18px;font-size:14px;color:var(--muted)}
.general-link button{background:none;border:none;color:var(--navy);font-weight:600;font-family:var(--sans);
  font-size:14px;cursor:pointer;text-decoration:underline;text-underline-offset:3px}
.general-link button:hover{color:var(--gold)}

.fields{display:grid;gap:17px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--navy);margin-bottom:7px}
.field input,.field select{width:100%;padding:14px 16px;border:1.5px solid var(--line);border-radius:12px;
  font-family:var(--sans);font-size:15px;color:var(--ink);background:var(--white);transition:border-color .18s,box-shadow .18s}
.field input:focus,.field select:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.16)}
.field .err{color:#c0392b;font-size:12.5px;margin-top:6px;display:none}
.field.invalid input{border-color:#c0392b}
.field.invalid .err{display:block}
.phone-row{display:grid;grid-template-columns:92px 1fr;gap:10px}
.phone-row .cc{display:flex;align-items:center;justify-content:center;background:var(--mist);
  border:1.5px solid var(--line);border-radius:12px;font-weight:600;color:var(--navy)}
.seg{display:flex;gap:8px}
.seg button{flex:1;padding:11px;border:1.5px solid var(--line);background:var(--white);border-radius:11px;
  font-family:var(--sans);font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;transition:.18s}
.seg button.on{border-color:var(--gold);background:rgba(201,168,76,.10);color:var(--navy)}
.reassure{display:flex;gap:10px;align-items:flex-start;background:rgba(201,168,76,.09);
  border:1px solid rgba(201,168,76,.28);border-radius:12px;padding:12px 15px;font-size:13px;color:#7a6a34;line-height:1.5}
.reassure svg{flex:none;color:var(--gold);margin-top:1px}
.datetime{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.nav-btns{display:flex;align-items:center;gap:14px;margin-top:28px}
.qz-btn{font-family:var(--sans);font-weight:600;font-size:15px;cursor:pointer;border-radius:99px;
  padding:15px 34px;border:none;transition:transform .15s,box-shadow .2s,background .2s}
.qz-btn-next{background:var(--navy);color:#fff;box-shadow:var(--shadow-sm)}
.qz-btn-next:hover{background:var(--navy-soft);transform:translateY(-2px)}
.qz-btn-back{background:transparent;color:var(--muted);padding:15px 6px}
.qz-btn-back:hover{color:var(--navy)}
.arw{display:inline-block;margin-inline-start:8px}
html[dir="rtl"] .arw{transform:scaleX(-1)}

.done{text-align:center;padding:12px 0}
.done .seal{width:86px;height:86px;border-radius:50%;margin:0 auto 24px;
  background:linear-gradient(135deg,var(--gold),var(--gold-soft));display:grid;place-items:center;color:#fff;
  box-shadow:0 14px 40px -12px rgba(201,168,76,.6);animation:pop .5s cubic-bezier(.2,1.4,.4,1)}
@keyframes pop{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.done h2{font-family:var(--serif);font-size:32px;color:var(--navy);margin-bottom:11px}
.done p{color:var(--muted);font-size:15px;line-height:1.6;max-width:440px;margin:0 auto 24px}
.summary{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:20px 24px;margin:0 auto 24px;max-width:440px;text-align:start}
.summary .row{display:flex;justify-content:space-between;gap:20px;padding:9px 0;font-size:14px;border-bottom:1px dashed var(--line)}
.summary .row:last-child{border-bottom:none}
.summary .row span{color:var(--muted)}
.summary .row b{color:var(--navy);font-weight:600;text-align:end}
.wa{display:inline-flex;align-items:center;gap:10px;background:#25D366;color:#fff;font-weight:600;
  border-radius:99px;padding:16px 30px;font-size:15.5px;box-shadow:0 12px 30px -14px rgba(37,211,102,.7);border:none;cursor:pointer}
.wa:hover{background:#20bd5b}
.done .alt{display:block;margin-top:16px;font-size:13.5px;color:var(--muted)}
.done .alt a{color:var(--navy);font-weight:600;text-decoration:underline;text-underline-offset:3px}

.step{animation:fade .42s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* FOOTER: uses the shared Hollywood footer style (main.css) */

@media(max-width:820px){
  .shell{grid-template-columns:1fr}
  .rail{padding:26px 24px;flex-direction:row;flex-wrap:wrap;align-items:center;gap:16px}
  .rail::after{display:none}
  .rail h2,.rail .lede,.rail .eyebrow-r{display:none}
  .rail-progress{margin:0;flex:1;min-width:180px}
  .trust{margin:0;display:none}
  .stage{padding:32px 20px 96px;align-items:flex-start}
  .sub{max-width:100%}
  .options.two{grid-template-columns:1fr}
  .datetime{grid-template-columns:1fr}
  .nav-btns{position:sticky;bottom:0;background:linear-gradient(transparent,var(--cream) 32%);padding:14px 0 18px;margin-top:22px}
  .qz-btn-next{flex:1}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
.done .team-note{display:flex;align-items:flex-start;gap:11px;max-width:440px;text-align:start;margin:14px auto 22px;padding:14px 15px 15px;background:#0B1D3A;border-radius:14px;box-shadow:0 10px 26px rgba(11,29,58,.22);animation:teamNoteIn .5s ease both}
.done .team-note .tn-ico{flex:0 0 auto;width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(201,168,76,.16);border:1px solid rgba(201,168,76,.45);color:var(--gold)}
.done .team-note .tn-ico svg{width:21px;height:21px}
.done .team-note .tn-body{flex:1;min-width:0}
.done .team-note .tn-title{margin:0 0 4px;font-family:'Playfair Display',Georgia,serif;font-size:15px;color:#C9A84C}
.done .team-note .tn-msg{margin:0;font-size:13.5px;line-height:1.55;color:#e7ebf2;font-weight:400}
.done .team-note .tn-pills{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}
.done .team-note .tn-pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;padding:5px 11px;border-radius:20px;white-space:nowrap}
.done .team-note .tn-pill svg{width:14px;height:14px}
.done .team-note .tn-wa{background:#C9A84C;color:#0B1D3A}
.done .team-note .tn-call{border:1px solid #C9A84C;color:#C9A84C}
@keyframes teamNoteIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes tnRing{0%,88%,100%{transform:rotate(0)}91%{transform:rotate(-13deg)}94%{transform:rotate(13deg)}97%{transform:rotate(-7deg)}}
</style>
</head>

let lang='en';
const st={ dept:null, deptLabel:'', treat:null, treatLabel:'', doc:'nopref', docLabel:'', first:'first',
           name:'', phone:'', date:'', time:'' };
let flow=['dept','treat','doc','details','datetime'];
let pos=0;
const t=()=>S[lang];
const card=document.getElementById('card');

function computeFlow(){
  flow = st.dept==='general' ? ['dept','details','datetime'] : ['dept','treat','doc','details','datetime'];
}

/* ================= RENDER ================= */
function render(){
  const cur = flow[pos];
  document.getElementById('bar').style.width = ((pos)/flow.length*100+12)+'%';
  document.getElementById('pNow').textContent = pos+1;
  document.getElementById('pTot').textContent = flow.length;

  let h='';
  if(cur==='dept'){
    h=head(t().q1,t().q1s)+'<div class="options">'+
      DEPTS[lang].map((d,i)=>optCard(d[0],iconFor(d[0]),d[1],d[2],st.dept===d[0])).join('')+'</div>'+
      `<p class="general-link">${t().general} <button data-general>${t().generalCta}</button></p>`;
  }
  else if(cur==='treat'){
    const list=TREAT[st.dept][lang];
    h=head(t().q2,t().q2s)+'<div class="options two">'+
      list.map((o,i)=>optCard('t'+i,IC.spark,o[0],o[1],st.treat===('t'+i))).join('')+'</div>';
  }
  else if(cur==='doc'){
    const ids=ROUTE[st.dept]||[];
    let opts=optCard('nopref',IC.star,t().noPref[0],t().noPref[1],st.doc==='nopref',t().matchTag);
    opts+=ids.map(id=>optCard(id,IC.doc,DOCS[id][lang][0],DOCS[id][lang][1],st.doc===id)).join('');
    h=head(t().q3,t().q3s)+'<div class="options">'+opts+'</div>';
  }
  else if(cur==='details'){
    h=head(t().q4,t().q4s)+
      '<div class="fields">'+
      `<div class="field" id="wName"><label>${t().fName}</label><input id="fName" value="${esc(st.name)}" placeholder="${t().fNamePh}" autocomplete="name"><div class="err">${t().fNameErr}</div></div>`+
      `<div class="field" id="wPhone"><label>${t().fPhone}</label><div class="phone-row"><div class="cc" dir="ltr">🇪🇬 +20</div><input id="fPhone" dir="ltr" value="${esc(st.phone)}" placeholder="${t().fPhonePh}" inputmode="tel" autocomplete="tel"></div><div class="err">${t().fPhoneErr}</div></div>`+
      `<div class="field"><label>${t().firstQ}</label><div class="seg">
         <button data-first="first" class="${st.first==='first'?'on':''}">${t().first[0]}</button>
         <button data-first="return" class="${st.first==='return'?'on':''}">${t().first[1]}</button></div></div>`+
      `<div class="reassure"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="10" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg><span>${t().reassure}</span></div>`+
      '</div>';
  }
  else if(cur==='datetime'){
    const today=new Date().toISOString().split('T')[0];
    h=head(t().q5,t().q5s)+
      '<div class="fields"><div class="datetime">'+
      `<div class="field" id="wDate"><label>${t().fDate}</label><input id="fDate" type="date" min="${today}" value="${st.date}"><div class="err">${t().fDateErr}</div></div>`+
      `<div class="field"><label>${t().fTime}</label><select id="fTime"><option value="">${t().anytime}</option>${t().times.map(x=>`<option${st.time===x?' selected':''}>${x}</option>`).join('')}</select></div>`+
      '</div></div>';
  }
  h+=navButtons(cur);
  card.className='qz-card step';
  card.innerHTML=h;
}
function head(q,sub){return `<div class="qz-eyebrow">${IC.spark}${t().eyebrow}</div><h1 class="q">${q}</h1><p class="sub">${sub}</p>`}
function iconFor(k){return IC[k]||IC.spark}
function optCard(val,icon,title,sub,sel,tag){
  return `<button class="opt${sel?' sel':''}${tag?' rec':''}" data-opt="${val}">
    <span class="ic">${icon}</span>
    <span class="txt"><b>${title}</b><span>${sub}</span></span>
    ${tag?`<span class="tag">${tag}</span>`:`<span class="chk">${CHK}</span>`}</button>`;
}
function navButtons(cur){
  const showBack=pos>0;
  const isForm=(cur==='details'||cur==='datetime');
  const last=(pos===flow.length-1);
  const label=last?t().finish:t().next;
  return `<div class="nav-btns">
    ${showBack?`<button class="qz-btn qz-btn-back" data-back>${t().back}</button>`:''}
    ${isForm?`<button class="qz-btn qz-btn-next" data-next>${label}<span class="arw">→</span></button>`:''}
  </div>`;
}
function esc(s){return (s||'').replace(/"/g,'&quot;')}

/* ================= EVENT DELEGATION (survives i18n body reset) ================= */
document.addEventListener('click',(e)=>{
  const opt=e.target.closest('.opt');
  if(opt && card.contains(opt)){
    const v=opt.dataset.opt; const cur=flow[pos];
    if(cur==='dept'){
      const d=DEPTS[lang].find(x=>x[0]===v);
      st.dept=v; st.deptLabel=d?d[1]:v; st.treat=null; st.treatLabel=''; st.doc='nopref'; st.docLabel='';
      computeFlow();
    } else if(cur==='treat'){
      const list=TREAT[st.dept][lang]; const idx=+v.slice(1);
      st.treat=v; st.treatLabel=list[idx][0]+' — '+list[idx][1];
    } else if(cur==='doc'){
      st.doc=v; st.docLabel = v==='nopref'? t().matchMe : DOCS[v][lang][0];
    }
    pos++; render(); scrollTop(); return;
  }
  const gen=e.target.closest('[data-general]');
  if(gen){ st.dept='general'; st.deptLabel=(lang==='ar'?'استشارة عامة':'General consultation');
    st.treat=null; st.treatLabel=(lang==='ar'?'استشارة عامة':'General consultation'); st.doc='nopref';
    computeFlow(); pos=1; render(); scrollTop(); return; }

  if(e.target.closest('[data-back]')){ pos--; render(); scrollTop(); return; }

  const seg=e.target.closest('[data-first]');
  if(seg){ st.first=seg.dataset.first; render(); return; }

  if(e.target.closest('[data-next]')){ handleNext(); return; }

  if(e.target.closest('[data-wa]')){ sendWhatsApp(); return; }
});

/* live date validation (Friday closed) */
document.addEventListener('change',(e)=>{
  if(e.target.id==='fDate'){
    const w=document.getElementById('wDate');
    if(e.target.value){
      const day=new Date(e.target.value+'T00:00').getDay(); // 5 = Friday
      if(day===5){ w.classList.add('invalid'); e.target.value=''; st.date=''; return; }
    }
    w.classList.remove('invalid'); st.date=e.target.value;
  }
  if(e.target.id==='fTime'){ st.time=e.target.value; }
});

function handleNext(){
  const cur=flow[pos];
  if(cur==='details'){
    st.name=(document.getElementById('fName').value||'').trim();
    st.phone=(document.getElementById('fPhone').value||'').trim();
    let ok=true;
    const wN=document.getElementById('wName'), wP=document.getElementById('wPhone');
    if(!st.name){ wN.classList.add('invalid'); ok=false; } else wN.classList.remove('invalid');
    if(st.phone.replace(/\D/g,'').length<7){ wP.classList.add('invalid'); ok=false; } else wP.classList.remove('invalid');
    if(!ok){ (document.getElementById(!st.name?'fName':'fPhone')).focus(); return; }
  }
  if(cur==='datetime'){
    const dv=document.getElementById('fDate').value;
    if(dv){ const day=new Date(dv+'T00:00').getDay(); if(day===5){ document.getElementById('wDate').classList.add('invalid'); return; } }
    st.date=dv; st.time=document.getElementById('fTime').value;
  }
  if(pos===flow.length-1){ saveBooking(); renderDone(); scrollTop(); return; }
  pos++; render(); scrollTop();
}

function whenLabel(){
  if(!st.date && !st.time) return lang==='ar'?'أي وقت':'Flexible';
  const d = st.date ? new Date(st.date+'T00:00').toLocaleDateString(lang==='ar'?'ar-EG':'en-GB',{weekday:'short',day:'numeric',month:'short'}) : '';
  return [d, st.time].filter(Boolean).join(' · ') || (lang==='ar'?'أي وقت':'Flexible');
}

  document.getElementById('bar').style.width='100%';
  const name=st.name||(lang==='ar'?'يا قمر':'gorgeous');

  card.className='qz-card step';
  card.innerHTML=`<div class="done">
    <div class="seal"><svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6 9 17l-5-5"/></svg></div>
    <h2>${t().doneTitle.replace('<span></span>',`<span>${name}</span>`)}</h2>
    <p>${t().doneMsg}</p>
    <div class="summary">
      <div class="row"><span>${t().sGoal}</span><b>${st.deptLabel||t().none}</b></div>
      <div class="row"><span>${t().sTreat}</span><b>${treat}</b></div>

/* build the prefilled WhatsApp message and open it */
function buildWaText(){
  const L=t(); const nl='%0A';
  const treat = st.treatLabel || (lang==='ar'?'استشارة عامة':'General consultation');
  const parts=[
    L.waMsg,'',
    `${L.waName}: ${st.name}`,
    `${L.waGoal}: ${st.deptLabel}`,
    `${L.waTreat}: ${treat}`,
    `${L.waDoc}: ${st.docLabel||L.matchMe}`,
    `${L.waWhen}: ${whenLabel()}`,
    `${L.waFirst}: ${st.first==='first'?L.first[0]:L.first[1]}`
  ];
  return parts.map(encodeURIComponent).join(nl);
}
function sendWhatsApp(){
  const url=`https://wa.me/${WHATSAPP}?text=${buildWaText()}`;
  window.open(url,'_blank','noopener');
}

/* Persist to the site's Supabase `bookings` table (columns: full_name, phone,
   email, treatment, preferred_date, preferred_time, message). The quiz-only
   answers (goal, specialist, first visit, language) are packed into `message`
   so the admin dashboard shows the full context. Fails silently so the
   WhatsApp handoff always works even if the DB is unreachable. */
function saveBooking(){
  try{
    const treat = st.treatLabel || (lang==='ar'?'General consultation':'General consultation');
    const noteLines=[
      'Goal: '+(st.deptLabel||'—'),
      'Specialist: '+(st.docLabel||'Match me with the best'),
      'First visit: '+(st.first==='first'?'Yes':'No (returning)'),
      'Submitted in: '+(lang==='ar'?'Arabic':'English')
    ];
    const payload={
      full_name:      st.name,
      phone:          '+20 '+st.phone,
      email:          null,
      treatment:      treat,
      preferred_date: st.date||null,
      preferred_time: st.time||null,
      message:        noteLines.join('\n')
    };
    var db = window.HC && window.HC.db;                       // shared client from supabase-config.js
    if(db){ db.from('bookings').insert(payload).then(function(r){
      if(r && r.error) console.warn('[booking] save error', r.error);
    }); }
    else if(window.supabaseClient){ window.supabaseClient.from('bookings').insert(payload); }
    console.log('[booking]',payload);
  }catch(err){ console.warn('save skipped',err); }
}

function scrollTop(){ document.querySelector('.stage').scrollIntoView({behavior:'smooth',block:'start'}); }

/* ================= LANGUAGE =================
   The shared site header (i18n.js) owns the language toggle and the document
   dir/lang. We read the current language from I18N, translate the quiz's own
   strings (rail + footer, marked data-qz) and re-render the card. We stay in
   sync by listening for the i18n:applied event that i18n.js dispatches. */
function applyLang(){
  lang = (window.I18N && typeof I18N.current === 'function') ? I18N.current() : lang;
  document.querySelectorAll('[data-qz]').forEach(el=>{
    const k=el.getAttribute('data-qz'); const v=t()[k];
    if(v!==undefined) el.innerHTML=v;
  });
  render();
}
document.addEventListener('i18n:applied', function(e){
  if(e && e.detail && e.detail.lang) lang = e.detail.lang;
  applyLang();
});

/* init */
applyLang();
