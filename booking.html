<body>

    <!--NAV-->


  <section class="page-hero">
    <div class="container">
      <div class="lux-line"></div>
      <p class="eyebrow" data-i18n="booking.eyebrow">Online Booking</p>
      <h1 data-i18n="booking.title">Reserve Your Consultation</h1>
      <p data-i18n="booking.subtitle">Choose your preferred treatment, specialist, and time. We'll confirm within 2 hours.</p>
      <div class="breadcrumb">
        <a href="index.html" data-i18n="nav.home">Home</a>
        <span>/</span>
        <span data-i18n="nav.book">Book Now</span>
      </div>
    </div>
  </section>

  <section class="section bg-cream">
    <div class="container">
      <div style="max-width:640px;margin:0 auto">
        <form id="bookingForm" class="card fade-up" style="padding:2.5rem" novalidate>
          <div class="form-group">
            <label class="form-label" data-i18n="booking.form.name">Full Name</label>
            <input type="text" name="name" class="form-input" required>
          </div>

          <div class="form-group">
            <label class="form-label" data-i18n="booking.form.phone">Phone Number</label>
            <input type="tel" name="phone" class="form-input" placeholder="+20 ..." required>
          </div>

          <div class="form-group">
            <label class="form-label" data-i18n="booking.form.email">Email Address</label>
            <input type="email" name="email" class="form-input" required>
          </div>

          <!-- Step 1: Treatment category -->
          <div class="form-group">
            <label class="form-label" data-i18n="booking.form.treatment">Select Treatment</label>
            <select name="treatment" id="treatmentSelect" class="form-select" required>
              <option value="" data-i18n="booking.form.select">— Select —</option>
              <option value="bodyshaping" data-i18n="treatment.bodyshaping.name">Body Shaping</option>
              <option value="skincare" data-i18n="treatment.skincare.name">Skin Rejuvenation</option>
              <option value="hair" data-i18n="treatment.hair.name">Hair Restoration</option>
              <option value="votiva" data-i18n="treatment.votiva.name">Votiva</option>
              <option value="laser" data-i18n="treatment.laser.name">Laser Treatments</option>
              <option value="consultation" data-i18n="booking.form.consultation">Free Consultation</option>
            </select>
          </div>

          <!-- Step 2: Specific procedure (conditional — only when treatment has subtreatments) -->
          <div class="form-group conditional" id="subTreatmentGroup">
            <label class="form-label" data-i18n="booking.form.subtreatment">Specific Procedure</label>
            <select name="subtreatment" id="subtreatmentSelect" class="form-select">
              <option value="" data-i18n="booking.form.subtreatment.any">— Any / Not sure —</option>
            </select>
          </div>

          <!-- Step 2b: Laser area picker (only shown when "Laser Treatments" is selected) -->
          <div class="form-group conditional" id="laserAreaGroup">
            <label class="form-label" data-i18n="booking.form.laserarea">Treatment Area</label>
            <select name="laserArea" id="laserAreaSelect" class="form-select">
              <option value="" data-i18n="booking.form.laserarea.select">— Select an area —</option>
            </select>
          </div>

          <!-- Preferred Doctor (conditional — only when treatment chosen) -->
          <div class="form-group conditional" id="doctorGroup">
            <label class="form-label" data-i18n="booking.form.doctor">Preferred Doctor</label>
            <select name="doctor" id="doctorSelect" class="form-select">
              <option value="" data-i18n="booking.form.doctor.any">— No preference (match me with the best specialist) —</option>
            </select>
          </div>

          <!-- Duration summary (read-only, appears when a treatment with a known duration is selected) -->
          <div class="form-group conditional" id="durationGroup">
            <div class="duration-summary">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="flex-shrink:0">
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
              </svg>
              <span><span data-i18n="booking.form.duration.label">Expected session duration</span>: <strong id="durationValue">—</strong></span>
            </div>
            <!-- Hidden input so the duration is included in form submission -->
            <input type="hidden" name="duration" id="durationField" value="">
          </div>

          <div class="grid grid-2">
            <div class="form-group">
              <label class="form-label" data-i18n="booking.form.date">Preferred Date</label>
              <input type="date" name="date" class="form-input" required>
              <p class="form-hint" id="dateFeedback" data-i18n="booking.form.date.hint">Open Sat – Thu · Closed Friday</p>
            </div>
            <div class="form-group">
              <label class="form-label" data-i18n="booking.form.time">Preferred Time</label>
              <select name="time" class="form-select" required>
                <option value="">—</option>
                <option>10:00 AM</option>
                <option>11:00 AM</option>
                <option>12:00 PM</option>
                <option>1:00 PM</option>
                <option>2:00 PM</option>
                <option>3:00 PM</option>
                <option>4:00 PM</option>
                <option>5:00 PM</option>
                <option>6:00 PM</option>
                <option>7:00 PM</option>
                <option>8:00 PM</option>
                <option>9:00 PM</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" data-i18n="booking.form.message">Additional Notes (optional)</label>
            <textarea name="message" class="form-textarea"></textarea>
          </div>

          <button type="submit" class="btn btn-primary" style="width:100%;padding:1rem;font-size:0.875rem" data-i18n="booking.form.submit">Request Appointment</button>

          <p style="text-align:center;color:var(--muted);font-size:0.75rem;margin-top:1.25rem" data-i18n="booking.form.privacy">We respect your privacy. Your data is never shared.</p>
        </form>
      </div>
    </div>
  </section>

    <!--FOOTER-->


  <script src="assets/js/i18n.js"></script>
  <script src="assets/js/main.js"></script>
  <script>
  (function () {
    // ─── Doctor master list ──────────────────────────────────────────
    const DOCTORS = {
      sara:   { i18n: 'doctor.sara.name' },
      rana:   { i18n: 'doctor.rana.name' },
      ranais: { i18n: 'doctor.ranais.name' },
      ehssan: { i18n: 'doctor.ehssan.name' },
      marwa:  { i18n: 'doctor.marwa.name' },
      nesma:  { i18n: 'doctor.nesma.name' },
      hadeel: { i18n: 'doctor.hadeel.name' }
    };

    // ─── Treatment categories + doctor mapping ──────────────────────
    // Mapping pulled from each treatment page's "Recommended Doctors" section.
    // duration is in MINUTES. Used for the read-only duration pill below the doctor select.
    const TREATMENTS = {
      bodyshaping: {
        doctors: ['sara', 'ranais', 'ehssan', 'marwa', 'rana'],
        sub: {
          'tesla-former':    { label_i18n: 'bs.tesla.name',          doctors: ['sara', 'ranais', 'ehssan'], duration: 60 },
          'emtone':          { label_i18n: 'bs.emtone.name',         doctors: ['sara', 'ranais', 'ehssan'], duration: 60 },
          'body-fx':         { label_i18n: 'bs.bodyfx.name',         doctors: ['sara', 'ranais', 'ehssan'], duration: 120 },
          'clatuu-alpha':    { label_i18n: 'bs.clatuu.name',         doctors: ['sara', 'ranais', 'ehssan'], duration: 60 },
          'hifu-body':       { label_i18n: 'bs.hifubody.name',       doctors: ['marwa', 'rana'],            duration: 60 },
          'morpheus8-body':  { label_i18n: 'bs.morpheus8body.name',  doctors: ['marwa', 'rana'],            duration: 60 }
        }
      },
      skincare: {
        doctors: ['marwa', 'rana', 'nesma'],
        sub: {
          'botox':           { label_i18n: 'sub.botox.name',          doctors: ['marwa', 'rana', 'nesma'], duration: 30 },
          'filler':          { label_i18n: 'sub.filler.name',         doctors: ['marwa', 'rana', 'nesma'], duration: 60 },
          'biostimulators':  { label_i18n: 'sub.biostimulators.name', doctors: ['marwa', 'rana'],          duration: 60 },
          'skin-boosters':   { label_i18n: 'sub.skinboosters.name',   doctors: ['marwa', 'rana', 'nesma'], duration: 30 },
          'morpheus8':       { label_i18n: 'sub.morpheus8.name',      doctors: ['marwa', 'rana'],          duration: 60 },
          'forma':           { label_i18n: 'sub.forma.name',          doctors: ['rana', 'marwa', 'nesma'], duration: 60 },
          'hifu':            { label_i18n: 'sub.hifu.name',           doctors: ['marwa', 'rana'],          duration: 60 },
          'hydrafacial':     { label_i18n: 'sub.hydrafacial.name',    doctors: ['nesma', 'rana', 'marwa'], duration: 60 },
          'iface':           { label_i18n: 'sub.iface.name',          doctors: ['marwa', 'rana', 'nesma'], duration: 60 }
        }
      },
      hair: {
        doctors: ['rana', 'nesma', 'marwa'],
        sub: {
          'exosomes':      { label_i18n: 'hr.exosomes.name', doctors: ['rana', 'nesma', 'marwa'], duration: 30 },
          'growth-factor': { label_i18n: 'hr.gf.name',       doctors: ['rana', 'nesma', 'marwa'], duration: 30 }
        }
      },
      votiva: {
        doctors: ['rana', 'marwa', 'nesma'],
        sub: {},
        duration: 60
      },
      laser: {
        doctors: ['nesma', 'rana', 'marwa'],
        sub: {}
        // Laser duration is determined by the selected area (see LASER_AREAS below).
      },
      consultation: {
        doctors: ['sara', 'rana', 'ranais', 'ehssan', 'marwa', 'nesma', 'hadeel'],
        sub: {}
        // Free consultation has no fixed duration — not shown in the duration pill.
      }
    };

    // Laser body areas — each with its own duration.
    // Per spec: Full body and Full body + face = 1 hour; everything else = 30 min.
    // Labels are kept inline (label_en / label_ar) since these are booking-specific.
    const LASER_AREAS = {
      'upper-lip':       { label_en: 'Upper lip',          label_ar: 'الشفة العليا',          duration: 30 },
      'chin':            { label_en: 'Chin',               label_ar: 'الذقن',                 duration: 30 },
      'face':            { label_en: 'Face',               label_ar: 'الوجه',                 duration: 30 },
      'neck':            { label_en: 'Neck',               label_ar: 'الرقبة',                duration: 30 },
      'underarms':       { label_en: 'Underarms',          label_ar: 'تحت الإبط',             duration: 30 },
      'arms':            { label_en: 'Arms',               label_ar: 'الذراعين',              duration: 30 },
      'back':            { label_en: 'Back',               label_ar: 'الظهر',                 duration: 30 },
      'abdomen':         { label_en: 'Abdomen',            label_ar: 'البطن',                 duration: 30 },
      'bikini':          { label_en: 'Bikini line',        label_ar: 'البكيني',               duration: 30 },
      'half-legs':       { label_en: 'Half legs',          label_ar: 'نصف الساقين',           duration: 30 },
      'full-legs':       { label_en: 'Full legs',          label_ar: 'الساقين كاملاً',        duration: 30 },
      'full-body':       { label_en: 'Full body',          label_ar: 'الجسم كاملاً',          duration: 60 },
      'full-body-face':  { label_en: 'Full body + face',   label_ar: 'الجسم كاملاً + الوجه',  duration: 60 }
    };

    // Format minutes as a localized, human-readable duration string.
    function formatDuration(mins, lang) {
      if (!mins || mins <= 0) return '';
      const isAr = lang === 'ar';
      if (mins < 60) return isAr ? (mins + ' دقيقة') : (mins + ' min');
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      if (m === 0) {
        if (isAr) {
          if (h === 1) return 'ساعة';
          if (h === 2) return 'ساعتين';
          return h + ' ساعات';
        }
        return h === 1 ? '1 hour' : (h + ' hours');
      }
      // Generic mixed format (not currently needed for our durations but kept for safety)
      return isAr ? (h + ' ساعة و' + m + ' دقيقة') : (h + 'h ' + m + 'min');
    }

    function t(key) {
      if (window.I18N && typeof window.I18N.t === 'function') {
        const val = window.I18N.t(key);
        return val === key ? key : val;
      }
      return key;
    }

    const treatmentSel  = document.getElementById('treatmentSelect');
    const subGroup      = document.getElementById('subTreatmentGroup');
    const subSel        = document.getElementById('subtreatmentSelect');
    const laserGroup    = document.getElementById('laserAreaGroup');
    const laserSel      = document.getElementById('laserAreaSelect');
    const doctorGroup   = document.getElementById('doctorGroup');
    const doctorSel     = document.getElementById('doctorSelect');
    const durationGroup = document.getElementById('durationGroup');
    const durationValue = document.getElementById('durationValue');
    const durationField = document.getElementById('durationField');

    function show(el) { el.classList.add('visible'); }
    function hide(el) { el.classList.remove('visible'); }

    function clearOptionsExceptFirst(select) {
      while (select.options.length > 1) select.remove(1);
    }

    function currentLang() {
      return (window.I18N && window.I18N.current) ? window.I18N.current() : 'en';
    }

    // Update the read-only duration pill + hidden form field.
    // Pass minutes (number) or null to hide.
    function updateDuration(mins) {
      if (!mins) {
        hide(durationGroup);
        durationField.value = '';
        return;
      }
      durationValue.textContent = formatDuration(mins, currentLang());
      durationField.value = mins + ' min';
      show(durationGroup);
    }

    // Append "(duration)" to a translated label for use in dropdown options.
    function labelWithDuration(label, mins) {
      if (!mins) return label;
      return label + ' (' + formatDuration(mins, currentLang()) + ')';
    }

    function renderSubtreatments(category) {
      clearOptionsExceptFirst(subSel);
      const cfg = TREATMENTS[category];
      if (!cfg || !cfg.sub || Object.keys(cfg.sub).length === 0) {
        hide(subGroup);
        subSel.value = '';
        return false;
      }
      for (const [key, info] of Object.entries(cfg.sub)) {
        const opt = document.createElement('option');
        opt.value = key;
        opt.setAttribute('data-i18n', info.label_i18n);
        // Duration is appended at render time; refreshed when language changes via re-render.
        opt.setAttribute('data-duration', info.duration || '');
        opt.textContent = labelWithDuration(t(info.label_i18n), info.duration);
        subSel.appendChild(opt);
      }
      show(subGroup);
      return true;
    }

    function renderLaserAreas() {
      clearOptionsExceptFirst(laserSel);
      const lang = currentLang();
      for (const [key, info] of Object.entries(LASER_AREAS)) {
        const opt = document.createElement('option');
        opt.value = key;
        opt.setAttribute('data-duration', info.duration);
        const baseLabel = lang === 'ar' ? info.label_ar : info.label_en;
        opt.textContent = labelWithDuration(baseLabel, info.duration);
        // Tag option for language refresh
        opt.setAttribute('data-laser-area-key', key);
        laserSel.appendChild(opt);
      }
    }

    function renderDoctors(doctorKeys) {
      clearOptionsExceptFirst(doctorSel);
      if (!doctorKeys || doctorKeys.length === 0) {
        hide(doctorGroup);
        doctorSel.value = '';
        return;
      }
      doctorKeys.forEach(function (key) {
        const d = DOCTORS[key];
        if (!d) return;
        const opt = document.createElement('option');
        opt.value = key;
        opt.setAttribute('data-i18n', d.i18n);
        opt.textContent = t(d.i18n);
        doctorSel.appendChild(opt);
      });
      show(doctorGroup);
    }

    function onTreatmentChange() {
      const cat = treatmentSel.value;
      if (!cat || !TREATMENTS[cat]) {
        hide(subGroup);
        hide(laserGroup);
        hide(doctorGroup);
        subSel.value = '';
        laserSel.value = '';
        doctorSel.value = '';
        updateDuration(null);
        return;
      }
      const cfg = TREATMENTS[cat];
      renderSubtreatments(cat);
      renderDoctors(cfg.doctors);
      doctorSel.value = '';

      // Laser uses an area picker instead of sub-treatments
      if (cat === 'laser') {
        renderLaserAreas();
        show(laserGroup);
        laserSel.value = '';
      } else {
        hide(laserGroup);
        laserSel.value = '';
      }

      // Duration: show only if category has a fixed duration (e.g. votiva).
      // Otherwise it will appear when the user picks a sub-treatment or laser area.
      if (cfg.duration) {
        updateDuration(cfg.duration);
      } else {
        updateDuration(null);
      }

      if (window.I18N && window.I18N.apply) window.I18N.apply();
    }

    function onSubtreatmentChange() {
      const cat = treatmentSel.value;
      const sub = subSel.value;
      const cfg = TREATMENTS[cat];
      if (!cfg) return;
      if (sub && cfg.sub[sub]) {
        renderDoctors(cfg.sub[sub].doctors);
        updateDuration(cfg.sub[sub].duration);
      } else {
        renderDoctors(cfg.doctors);
        // Reset to category duration (e.g. votiva) or hide.
        updateDuration(cfg.duration || null);
      }
      doctorSel.value = '';
      if (window.I18N && window.I18N.apply) window.I18N.apply();
    }

    function onLaserAreaChange() {
      const area = laserSel.value;
      if (area && LASER_AREAS[area]) {
        updateDuration(LASER_AREAS[area].duration);
      } else {
        updateDuration(null);
      }
    }

    treatmentSel.addEventListener('change', onTreatmentChange);
    subSel.addEventListener('change', onSubtreatmentChange);
    laserSel.addEventListener('change', onLaserAreaChange);

    // Re-render dropdowns and the duration pill when language toggles
    // (so duration suffix and laser area labels switch between EN/AR).
    document.querySelectorAll('[data-lang-toggle]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        // Defer so I18N.toggle()'s apply() runs first
        setTimeout(function () {
          const cat = treatmentSel.value;
          if (cat === 'laser') renderLaserAreas();
          if (cat && TREATMENTS[cat]) renderSubtreatments(cat);
          // Re-apply duration text in the new language
          if (durationField.value) {
            const mins = parseInt(durationField.value, 10);
            if (!isNaN(mins)) durationValue.textContent = formatDuration(mins, currentLang());
          }
        }, 0);
      });
    });

    // ─── Submission ────────────────────────────────────────────────
    function isFriday(dateStr) {
      if (!dateStr) return false;
      // dateStr is YYYY-MM-DD; build at noon to avoid timezone edge cases
      const d = new Date(dateStr + 'T12:00:00');
      return d.getDay() === 5; // 0 = Sun, 5 = Fri
    }

    function fridayMessage(lang) {
      return lang === 'ar'
        ? 'العيادة مغلقة يوم الجمعة. من فضلكِ اختاري يوم من السبت إلى الخميس.'
        : 'The clinic is closed on Fridays. Please choose a day from Saturday to Thursday.';
    }

    // ─── Date field ────────────────────────────────────────────────
    // Day-name translations (Sunday = 0)
    const DAY_NAMES_EN = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    const DAY_NAMES_AR = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];

    const dateInput = document.querySelector('input[name=date]');
    const dateFeedback = document.getElementById('dateFeedback');

    function formatPickedDate(iso) {
      if (!iso) return null;
      const d = new Date(iso + 'T12:00:00');
      const dd = String(d.getDate()).padStart(2, '0');
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const yyyy = d.getFullYear();
      const lang = (window.I18N && window.I18N.current()) || 'en';
      const names = lang === 'ar' ? DAY_NAMES_AR : DAY_NAMES_EN;
      return { ddmmyyyy: `${dd}/${mm}/${yyyy}`, dayName: names[d.getDay()], dayIdx: d.getDay() };
    }

    function updateDateFeedback() {
      const lang = (window.I18N && window.I18N.current()) || 'en';
      const iso = dateInput.value;
      if (!iso) {
        dateFeedback.classList.remove('form-hint-error', 'form-hint-ok');
        dateFeedback.textContent = lang === 'ar'
          ? 'مفتوح من السبت إلى الخميس · الجمعة مغلق'
          : 'Open Sat – Thu · Closed Friday';
        dateFeedback.setAttribute('data-i18n', 'booking.form.date.hint');
        return;
      }
      dateFeedback.removeAttribute('data-i18n');
      const info = formatPickedDate(iso);
      if (info.dayIdx === 5) {
        dateFeedback.classList.remove('form-hint-ok');
        dateFeedback.classList.add('form-hint-error');
        dateFeedback.textContent = lang === 'ar'
          ? `${info.ddmmyyyy} — ${info.dayName} (العيادة مغلقة). اختاري يوم تاني.`
          : `${info.ddmmyyyy} — ${info.dayName} (clinic closed). Please pick another day.`;
      } else {
        dateFeedback.classList.remove('form-hint-error');
        dateFeedback.classList.add('form-hint-ok');
        dateFeedback.textContent = `${info.ddmmyyyy} — ${info.dayName}`;
      }
    }

    dateInput.addEventListener('change', function () {
      const lang = (window.I18N && window.I18N.current()) || 'en';
      if (isFriday(this.value)) {
        this.setCustomValidity(fridayMessage(lang));
        this.reportValidity();
        updateDateFeedback();
        setTimeout(() => {
          this.value = '';
          this.setCustomValidity('');
          updateDateFeedback();
        }, 1500);
      } else {
        this.setCustomValidity('');
        updateDateFeedback();
      }
    });

    // Refresh on language toggle
    const langBtn = document.querySelector('[data-lang-toggle]');
    if (langBtn) langBtn.addEventListener('click', () => setTimeout(updateDateFeedback, 50));

    document.getElementById('bookingForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const data = Object.fromEntries(new FormData(this).entries());
      const lang = (window.I18N && window.I18N.current()) || 'en';

      if (!data.treatment) {
        alert(lang === 'ar'
          ? 'من فضلك اختاري العلاج أولاً.'
          : 'Please select a treatment first.');
        return;
      }

      if (isFriday(data.date)) {
        alert(fridayMessage(lang));
        return;
      }

      let doctorLabel = '';
      if (data.doctor && DOCTORS[data.doctor]) {
        doctorLabel = t(DOCTORS[data.doctor].i18n);
      } else {
        doctorLabel = t('booking.form.doctor.any');
      }

      const msg = lang === 'ar'
        ? `شكراً ${data.name}! تم استلام طلب الحجز.\n\nالطبيب: ${doctorLabel}\n\nسنتواصل معكِ خلال ساعتين على ${data.phone}.`
        : `Thank you, ${data.name}! Your appointment request has been received.\n\nDoctor: ${doctorLabel}\n\nWe'll contact you within 2 hours at ${data.phone}.`;
      alert(msg);
      this.reset();
      hide(subGroup);
      hide(doctorGroup);
      updateDateFeedback();
    });

    dateInput.min = new Date().toISOString().split('T')[0];

    // Deep-link: ?treatment=hair&sub=exosomes auto-selects
    const params = new URLSearchParams(window.location.search);
    const pre = params.get('treatment');
    if (pre && TREATMENTS[pre]) {
      treatmentSel.value = pre;
      onTreatmentChange();
      const preSub = params.get('sub');
      if (preSub && TREATMENTS[pre].sub && TREATMENTS[pre].sub[preSub]) {
        subSel.value = preSub;
        onSubtreatmentChange();
      }
    }
  })();
  </script>
</body>
</html>
