<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Staff Sign In — Hollywood Clinic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0B1D3A; --navy-2:#11264b; --gold:#C9A84C; --gold-soft:#e7d49a;
      --cream:#FAFBFD; --ink:#1c2433; --muted:#6b7488; --line:#e6e9f0;
      --danger:#b3261e;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;font-family:'Inter',system-ui,sans-serif;color:var(--ink);
      display:flex;align-items:center;justify-content:center;padding:1.5rem;
      background:
        radial-gradient(1200px 600px at 50% -10%, #16305c 0%, transparent 60%),
        linear-gradient(160deg, var(--navy) 0%, #07152c 100%);
      background-color:var(--navy);
    }
    .card{
      width:100%;max-width:400px;background:#fff;border-radius:18px;
      padding:2.6rem 2.4rem 2.4rem;
      box-shadow:0 30px 80px rgba(3,10,25,.55);
      border:1px solid rgba(201,168,76,.25);position:relative;overflow:hidden;
    }
    .card::before{content:"";position:absolute;inset:0 0 auto 0;height:3px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent)}
    .brand{display:flex;align-items:center;gap:.6rem;margin-bottom:1.6rem}
    .brand .dot{width:34px;height:34px;border-radius:50%;flex:none;
      background:linear-gradient(145deg,var(--gold),#a9863a);
      display:flex;align-items:center;justify-content:center;
      color:var(--navy);font-family:'Playfair Display',serif;font-weight:700;font-size:1.05rem}
    .brand b{font-family:'Playfair Display',serif;font-weight:600;color:var(--navy);font-size:1.02rem;line-height:1.1}
    .brand span{display:block;font-size:.7rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-top:2px}
    h1{font-family:'Playfair Display',serif;font-weight:600;font-size:1.5rem;color:var(--navy);margin-bottom:.3rem}
    .sub{color:var(--muted);font-size:.9rem;margin-bottom:1.6rem}
    label{display:block;font-size:.78rem;font-weight:600;color:var(--navy);margin:0 0 .35rem;letter-spacing:.01em}
    input{width:100%;padding:.8rem .9rem;border:1px solid var(--line);border-radius:10px;
      font-size:.95rem;font-family:inherit;background:var(--cream);transition:border-color .15s,box-shadow .15s}
    input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,.18);background:#fff}
    .field{margin-bottom:1.1rem}
    button{width:100%;padding:.85rem;border:none;border-radius:10px;cursor:pointer;
      font-family:inherit;font-weight:600;font-size:.95rem;letter-spacing:.02em;
      background:linear-gradient(145deg,var(--gold),#b8923c);color:var(--navy);
      transition:transform .12s,box-shadow .12s,opacity .12s}
    button:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(201,168,76,.35)}
    button:disabled{opacity:.6;cursor:wait;transform:none;box-shadow:none}
    .msg{margin-top:1rem;font-size:.85rem;padding:.7rem .85rem;border-radius:9px;display:none}
    .msg.error{display:block;background:#fbe9e7;color:var(--danger);border:1px solid #f3c9c4}
    .msg.info{display:block;background:#eef3fb;color:var(--navy);border:1px solid #d6e2f5}
    .foot{margin-top:1.5rem;text-align:center;font-size:.74rem;color:var(--muted)}
    .foot a{color:var(--muted)}
  </style>
</head>
<body>
 <div class="card">
 <div class="brand">
 <div class="dot">H</div>
 <div><b>Hollywood Clinic</b><span>Staff Console</span></div>
 </div>
 <h1>Sign in</h1>
 <p class="sub">Use the staff account set up in Supabase.</p>

 <div class="field">
 <label for="email">Email</label>
 <input id="email" type="email" autocomplete="username" placeholder="you@hollywoodclinic.com">
 </div>
 <div class="field">
 <label for="password">Password</label>
 <input id="password" type="password" autocomplete="current-password" placeholder="••••••••">
 </div>
 <button id="signinBtn">Sign in</button>
 <div id="msg" class="msg"></div>

 <p class="foot">Authorized staff only. Need access? Ask the clinic administrator.</p>
 </div>

 <script src="../assets/js/supabase-config.js"></script>
 <script>
    (function () {
      var btn = document.getElementById('signinBtn');
      var emailEl = document.getElementById('email');
      var pwEl = document.getElementById('password');
      var msg = document.getElementById('msg');

      function show(kind, text){ msg.className = 'msg ' + kind; msg.textContent = text; }
      function clearMsg(){ msg.className = 'msg'; msg.textContent = ''; }

      function waitForDB(){
        return new Promise(function(resolve){
          if (window.HC && window.HC.db) return resolve();
          document.addEventListener('hc:db-ready', resolve, { once:true });
          setTimeout(resolve, 4000);
        });
      }

      async function go(){
        clearMsg();
        var email = emailEl.value.trim();
        var pw = pwEl.value;
        if (!email || !pw){ show('error','Enter your email and password.'); return; }

        btn.disabled = true; btn.textContent = 'Signing in…';
        try {
          await waitForDB();
          if (!window.HC || !window.HC.db){
            show('error','Connection not ready. Check that the anon key is set in supabase-config.js.');
            return;
          }
          var res = await window.HC.auth.signIn(email, pw);
          if (res.error){ show('error','Wrong email or password.'); return; }

          var isAdmin = await window.HC.auth.isAdmin();
          if (!isAdmin){
            await window.HC.auth.signOut();
            show('error','This account is signed in but is not an admin. Ask the administrator to add you.');
            return;
          }
          show('info','Welcome back. Opening the dashboard…');
          window.location.href = 'dashboard.html';
        } catch (e){
          show('error','Something went wrong signing in. Try again.');
          console.error(e);
        } finally {
          btn.disabled = false; btn.textContent = 'Sign in';
        }
      }

      btn.addEventListener('click', go);
      pwEl.addEventListener('keydown', function(e){ if (e.key === 'Enter') go(); });

      // If already signed in as an admin, skip straight to the dashboard.
      waitForDB().then(async function(){
        if (window.HC && window.HC.db){
          var u = await window.HC.auth.user();
          if (u && u.data && u.data.user){
            var ok = await window.HC.auth.isAdmin();
            if (ok) window.location.href = 'dashboard.html';
          }
        }
      });
    })();
  </script>
</body>
</html>
