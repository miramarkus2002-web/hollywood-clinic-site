<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Dashboard — Hollywood Clinic</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0B1D3A; --navy-2:#11264b; --gold:#C9A84C;
      --cream:#FAFBFD; --ink:#1c2433; --muted:#6b7488; --line:#e6e9f0; --rail:#0c1f3e;
      --green:#1f8a52; --green-bg:#e7f4ec; --amber:#9a6a06; --amber-bg:#fbf1dc;
      --red:#b3261e; --red-bg:#fbe9e7; --blue:#1d4be8; --blue-bg:#e9eefb;
      --rail-w:230px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:'Inter',system-ui,sans-serif;color:var(--ink);background:var(--cream)}
    a{color:inherit;text-decoration:none}

    .rail{position:fixed;top:0;left:0;bottom:0;width:var(--rail-w);background:var(--rail);
      color:#cdd6e6;display:flex;flex-direction:column;padding:1.3rem 0;z-index:20;overflow-y:auto;scroll-behavior:smooth}
    .rail .brand{display:flex;align-items:center;gap:.6rem;padding:0 1.3rem 1.3rem;
      border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:.8rem}
    .rail .dot{width:32px;height:32px;border-radius:50%;flex:none;
      background:linear-gradient(145deg,var(--gold),#a9863a);color:var(--navy);
      display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-weight:700}
    .rail .brand b{font-family:'Playfair Display',serif;font-weight:600;color:#fff;font-size:.98rem;line-height:1.05}
    .rail .brand span{display:block;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:#8a97b0;margin-top:2px}
    .nav-group{padding:.4rem 0}
    .nav-label{font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:#6c7894;padding:.6rem 1.3rem .3rem}
    .nav-item{display:flex;align-items:center;gap:.65rem;padding:.6rem 1.3rem;font-size:.9rem;cursor:pointer;
      border-left:3px solid transparent;color:#cdd6e6;transition:background .12s,color .12s}
    .nav-item:hover{background:rgba(255,255,255,.05);color:#fff}
    .nav-item.active{background:rgba(201,168,76,.12);border-left-color:var(--gold);color:#fff;font-weight:600}
    .nav-item.soon{opacity:.45;cursor:not-allowed}
    .nav-item .badge{margin-left:auto;background:var(--gold);color:var(--navy);font-size:.68rem;font-weight:700;
      border-radius:20px;padding:1px 7px;min-width:18px;text-align:center}
    .nav-item.soon .tag{margin-left:auto;font-size:.6rem;letter-spacing:.08em;text-transform:uppercase;color:#8a97b0}
    .rail .spacer{flex:1;min-height:1rem}
    .signout{margin:.5rem 1.3rem 0;padding:.6rem .8rem;border:1px solid rgba(255,255,255,.14);border-radius:9px;
      color:#cdd6e6;font-size:.85rem;text-align:center;cursor:pointer;transition:background .12s}
    .signout:hover{background:rgba(255,255,255,.07);color:#fff}

    .main{margin-left:var(--rail-w);min-height:100vh}
    .topbar{position:sticky;top:0;background:rgba(250,251,253,.86);backdrop-filter:blur(8px);
      border-bottom:1px solid var(--line);padding:1.1rem 1.8rem;display:flex;align-items:center;gap:1rem;z-index:10}
    .topbar h1{font-family:'Playfair Display',serif;font-weight:600;font-size:1.4rem;color:var(--navy)}
    .topbar .who{margin-left:auto;font-size:.82rem;color:var(--muted)}
    .topbar .who b{color:var(--navy);font-weight:600}
    .wrap{padding:1.6rem 1.8rem 3rem}

    .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.6rem}
    .kpi{background:#fff;border:1px solid var(--line);border-radius:14px;padding:1.1rem 1.2rem}
    .kpi .n{font-family:'Playfair Display',serif;font-size:1.9rem;font-weight:600;color:var(--navy);line-height:1}
    .kpi .l{font-size:.78rem;color:var(--muted);margin-top:.4rem;letter-spacing:.02em}

    .panel{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden}
    .panel-head{display:flex;align-items:center;gap:.8rem;padding:1rem 1.3rem;border-bottom:1px solid var(--line)}
    .panel-head h2{font-family:'Playfair Display',serif;font-weight:600;font-size:1.1rem;color:var(--navy)}
    .head-right{margin-left:auto;display:flex;gap:.4rem;flex-wrap:wrap;align-items:center}
    .chip{font-size:.78rem;padding:.32rem .7rem;border-radius:20px;border:1px solid var(--line);
      background:#fff;color:var(--muted);cursor:pointer;transition:all .12s}
    .chip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
    .refresh{font-size:.78rem;padding:.32rem .7rem;border-radius:20px;border:1px solid var(--line);
      background:#fff;color:var(--navy);cursor:pointer}
    .add-btn{font-size:.82rem;font-weight:600;padding:.4rem .9rem;border-radius:9px;border:none;cursor:pointer;
      background:linear-gradient(145deg,var(--gold),#b8923c);color:var(--navy)}
    .add-btn:hover{box-shadow:0 6px 16px rgba(201,168,76,.32)}

    table{width:100%;border-collapse:collapse}
    th{text-align:left;font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);
      font-weight:600;padding:.7rem 1.3rem;border-bottom:1px solid var(--line);background:#fcfdff}
    td{padding:.85rem 1.3rem;border-bottom:1px solid var(--line);font-size:.88rem;vertical-align:top}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#fcfdff}
    .name{font-weight:600;color:var(--navy)}
    .sub{font-size:.78rem;color:var(--muted);margin-top:2px}
    .excerpt{max-width:340px;color:#39424f;line-height:1.45;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .stars{color:var(--gold);letter-spacing:1px;font-size:.95rem}
    .thumb{width:40px;height:40px;border-radius:8px;object-fit:cover;background:#eef0f4;border:1px solid var(--line)}

    .pill{display:inline-block;font-size:.72rem;font-weight:600;padding:.22rem .6rem;border-radius:20px;white-space:nowrap}
    .p-new{background:var(--blue-bg);color:#1d4be8}
    .p-confirmed{background:var(--amber-bg);color:var(--amber)}
    .p-done,.p-yes{background:var(--green-bg);color:var(--green)}
    .p-cancelled,.p-rejected,.p-archived,.p-read,.p-no{background:#eef0f4;color:#6b7488}
    .p-pending{background:var(--amber-bg);color:var(--amber)}
    .p-approved{background:var(--green-bg);color:var(--green)}

    .acts{display:flex;gap:.35rem;flex-wrap:wrap}
    .btn{font-size:.74rem;padding:.3rem .6rem;border-radius:7px;border:1px solid var(--line);
      background:#fff;color:var(--navy);cursor:pointer;transition:all .12s;white-space:nowrap}
    .btn:hover{border-color:var(--navy)}
    .btn.good{color:var(--green);border-color:#bfe0cc}.btn.good:hover{background:var(--green-bg)}
    .btn.warn{color:var(--amber);border-color:#ecdcb4}.btn.warn:hover{background:var(--amber-bg)}
    .btn.bad{color:var(--red);border-color:#f0cfca}.btn.bad:hover{background:var(--red-bg)}
    .btn.star{color:var(--gold);border-color:#ecdcb4}.btn.star.on{background:var(--gold);color:#fff;border-color:var(--gold)}
    .btn.edit{color:var(--navy);border-color:#cfd6e2}.btn.edit:hover{background:#eef2f8}
    /* up/down reorder control (Doctors > Order column) */
    .ord{display:inline-flex;align-items:center;gap:.3rem}
    .ordbtn{width:24px;height:24px;line-height:1;display:inline-flex;align-items:center;justify-content:center;
      font-size:.72rem;border:1px solid var(--line);border-radius:6px;background:#fff;color:var(--navy);cursor:pointer;
      transition:all .12s}
    .ordbtn:hover:not(:disabled){background:var(--navy);color:#fff;border-color:var(--navy)}
    .ordbtn:disabled{opacity:.32;cursor:default}
    .ordn{min-width:1.1rem;text-align:center;color:var(--ink);font-variant-numeric:tabular-nums}

    .state{padding:3rem 1.3rem;text-align:center;color:var(--muted)}
    .state .big{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--navy);margin-bottom:.3rem}
    .err{padding:1rem 1.3rem;background:var(--red-bg);color:var(--red);font-size:.85rem}
    .gate{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
      background:var(--navy);color:#cdd6e6;font-size:.9rem;z-index:50;text-align:center;padding:2rem}

    /* Editor modal */
    .overlay{position:fixed;inset:0;background:rgba(7,18,38,.55);backdrop-filter:blur(3px);
      display:none;align-items:flex-start;justify-content:center;padding:3rem 1rem;z-index:40;overflow-y:auto}
    .overlay.open{display:flex}
    .modal{background:#fff;width:100%;max-width:640px;border-radius:16px;overflow:hidden;
      box-shadow:0 30px 80px rgba(3,10,25,.4);border:1px solid rgba(201,168,76,.25)}
    .modal-head{display:flex;align-items:center;padding:1.1rem 1.4rem;border-bottom:1px solid var(--line)}
    .modal-head h3{font-family:'Playfair Display',serif;font-weight:600;color:var(--navy);font-size:1.15rem}
    .modal-head .x{margin-left:auto;cursor:pointer;color:var(--muted);font-size:1.3rem;line-height:1;border:none;background:none}
    .modal-body{padding:1.3rem 1.4rem;max-height:62vh;overflow-y:auto;scroll-behavior:smooth}
    .frow{display:grid;grid-template-columns:1fr 1fr;gap:.9rem 1rem;margin-bottom:.2rem}
    .fld{margin-bottom:1rem}
    .fld.full{grid-column:1 / -1}
    .fld label{display:block;font-size:.76rem;font-weight:600;color:var(--navy);margin-bottom:.35rem}
    .fld .hint{font-weight:400;color:var(--muted);font-size:.72rem}
    .fld input[type=text],.fld input[type=number],.fld input[type=date],.fld textarea,.fld select{
      width:100%;padding:.6rem .7rem;border:1px solid var(--line);border-radius:9px;font-size:.9rem;
      font-family:inherit;background:var(--cream);color:var(--ink)}
    .fld textarea{min-height:90px;resize:vertical}
    .fld input:focus,.fld textarea:focus,.fld select:focus{outline:none;border-color:var(--gold);
      box-shadow:0 0 0 3px rgba(201,168,76,.16);background:#fff}
    .fld.check{display:flex;align-items:center;gap:.5rem}
    .fld.check input{width:18px;height:18px;accent-color:var(--gold)}
    .fld.check label{margin:0}
    .ar{direction:rtl;text-align:right}
    .img-field{display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
    .img-prev{width:74px;height:74px;border-radius:10px;object-fit:cover;background:#eef0f4;border:1px solid var(--line);flex:none}
    .img-field input[type=file]{font-size:.82rem}
    .img-status{font-size:.78rem;color:var(--muted)}
    .img-status.ok{color:var(--green)} .img-status.bad{color:var(--red)}
    .import-panel{background:#f4f7fb;border:1px dashed var(--gold);border-radius:10px;padding:.85rem 1rem;margin-bottom:1.2rem}
    .import-panel .ip-row{display:flex;gap:1.6rem;flex-wrap:wrap;align-items:flex-end;margin-top:.55rem}
    .imp-lbl{font-size:.82rem;color:var(--ink);display:flex;flex-direction:column;gap:.3rem;font-weight:600}
    .imp-lbl input[type=file]{font-weight:400;font-size:.8rem}
    .imp-status{font-size:.8rem;color:var(--green);align-self:center;min-height:1em}
    .modal-foot{display:flex;gap:.6rem;padding:1rem 1.4rem;border-top:1px solid var(--line);background:#fcfdff}
    .modal-foot .save{margin-left:auto;background:linear-gradient(145deg,var(--gold),#b8923c);color:var(--navy);
      border:none;padding:.6rem 1.3rem;border-radius:9px;font-weight:600;font-size:.9rem;cursor:pointer}
    .modal-foot .cancel{background:#fff;border:1px solid var(--line);padding:.6rem 1.1rem;border-radius:9px;
      font-size:.9rem;cursor:pointer;color:var(--muted)}
    .modal-foot .save:disabled{opacity:.6;cursor:wait}
    .form-err{color:var(--red);font-size:.82rem;align-self:center}

    @media(max-width:820px){
      :root{--rail-w:0px}
      .rail{transform:translateX(-100%)} .main{margin-left:0}
      .excerpt{max-width:160px} .frow{grid-template-columns:1fr}
    }
    /* ===== Services / Add Service form ===== */
    .svc-wrap{padding:1.1rem 1.4rem 3rem}
    .svc-list{width:100%;border-collapse:collapse}
    .svc-list th{text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:.6rem .7rem;border-bottom:1px solid var(--line)}
    .svc-list td{padding:.7rem .7rem;border-bottom:1px solid var(--line);font-size:.9rem;color:var(--ink)}
    .svc-list tr:hover td{background:#faf7ef}
    .svc-badge{display:inline-block;font-size:.7rem;padding:.12rem .5rem;border-radius:99px;background:#eef2f8;color:#3a4a66}
    .svc-badge.off{background:#fbeaea;color:#a23}
    .svc-form h4{font-family:'Playfair Display',serif;color:var(--navy);font-size:1rem;margin:1.6rem 0 .7rem;padding-bottom:.35rem;border-bottom:1px solid var(--line)}
    .svc-form h4:first-child{margin-top:.4rem}
    .svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem .9rem}
    .svc-grid.three{grid-template-columns:1fr 1fr 1fr}
    .svc-fld{display:flex;flex-direction:column;gap:.25rem;margin-bottom:.2rem}
    .svc-fld label{font-size:.74rem;color:var(--muted);font-weight:600}
    .svc-fld input,.svc-fld textarea,.svc-fld select{font:inherit;font-size:.86rem;padding:.5rem .6rem;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);width:100%}
    .svc-fld textarea{min-height:64px;resize:vertical}
    .svc-fld input[dir=rtl],.svc-fld textarea[dir=rtl]{font-family:'Tajawal',sans-serif}
    .svc-rows{display:flex;flex-direction:column;gap:.55rem}
    .svc-row{display:grid;gap:.5rem;align-items:start;padding:.6rem;border:1px solid var(--line);border-radius:10px;background:#fcfbf7;position:relative}
    .svc-row .rm{position:absolute;top:.35rem;right:.4rem;cursor:pointer;border:none;background:none;color:#a23;font-size:1.05rem;line-height:1}
    .svc-row.pair{grid-template-columns:1fr 1fr}
    .svc-addrow{align-self:flex-start;margin-top:.5rem;background:#fff;border:1px dashed var(--gold);color:var(--navy);font-weight:600;font-size:.8rem;padding:.45rem .9rem;border-radius:8px;cursor:pointer}
    .svc-addrow:hover{background:#fbf6e8}
    .svc-imgrow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.8rem}
    .svc-img{border:1px dashed var(--line);border-radius:10px;padding:.7rem;text-align:center;background:#fcfbf7}
    .svc-img img{max-width:100%;max-height:120px;border-radius:6px;margin-top:.5rem;display:none}
    .svc-img .st{font-size:.72rem;color:var(--muted);margin-top:.3rem;min-height:1em}
    .svc-img .st.ok{color:#1a7a3a}.svc-img .st.bad{color:#a23}
    .svc-actions{display:flex;gap:.7rem;margin-top:1.8rem;position:sticky;bottom:0;background:linear-gradient(180deg,transparent,#fff 30%);padding:1rem 0 .3rem}
    .svc-actions .add-btn{font-size:.92rem}
    .svc-cancel{background:#fff;border:1px solid var(--line);color:var(--muted);font-weight:600;padding:.6rem 1.2rem;border-radius:8px;cursor:pointer}
    .svc-msg{font-size:.85rem;align-self:center}
    .svc-msg.ok{color:#1a7a3a}.svc-msg.bad{color:#a23}
    @media(max-width:720px){.svc-grid,.svc-grid.three,.svc-imgrow{grid-template-columns:1fr}}
    .svc-sec-h{display:flex;align-items:center;gap:.6rem;margin:.2rem 0 .7rem}
    .svc-sec-h h4{font-size:.9rem;font-weight:700;color:var(--navy);margin:0;display:flex;align-items:center;gap:.5rem}
    .svc-count{background:var(--sky,#eef3fb);color:var(--navy);font-size:.72rem;font-weight:700;border-radius:999px;padding:.08rem .5rem}
  </style>
</head>
<body>
 <div class="gate" id="gate">Checking access…</div>

 <aside class="rail" id="rail" style="display:none">
 <div class="brand"><div class="dot">H</div><div><b>Hollywood Clinic</b><span>Staff Console</span></div></div>
 <div class="nav-group">
 <div class="nav-label">Inbox</div>
 <div class="nav-item active" data-section="bookings">Bookings <span class="badge" id="b-bookings" style="display:none">0</span></div>
 <div class="nav-item" data-section="messages">Messages <span class="badge" id="b-messages" style="display:none">0</span></div>
 <div class="nav-item" data-section="reviews">Reviews <span class="badge" id="b-reviews" style="display:none">0</span></div>
 </div>
 <div class="nav-group">
 <div class="nav-label">Content</div>
 <div class="nav-item" data-section="doctors">Doctors</div>
 <div class="nav-item" data-section="blog">Blog</div>
 <div class="nav-item" data-section="departments">Departments</div>
 <div class="nav-item" data-section="services">Services <span class="badge" style="background:var(--gold);color:var(--navy)">+</span></div>
 <div class="nav-item" data-section="sitecopy">Site Copy</div>
 </div>
 <div class="nav-group">
 <div class="nav-label">Records</div>
 <div class="nav-item" data-section="patients">Patients</div>
 </div>
 <div class="spacer"></div>
 <div class="signout" id="signout">Sign out</div>
 </aside>

 <div class="main" id="main" style="display:none">
 <div class="topbar">
 <h1 id="title">Bookings</h1>
 <div class="who">Signed in as <b id="whoEmail">—</b></div>
 </div>
 <div class="wrap">
 <div class="kpis" id="kpis"></div>
 <div class="panel">
 <div class="panel-head">
 <h2 id="panelTitle">Bookings</h2>
 <div class="head-right" id="headRight"></div>
 </div>
 <div id="content"><div class="state">Loading…</div></div>
 </div>
 </div>
 </div>

 <!-- Editor modal -->
 <div class="overlay" id="overlay">
 <div class="modal">
 <div class="modal-head"><h3 id="modalTitle">Edit</h3><button class="x" id="modalClose">×</button></div>
 <div class="modal-body" id="modalBody"></div>
 <div class="modal-foot">
 <span class="form-err" id="formErr"></span>
 <button class="cancel" id="modalCancel">Cancel</button>
 <button class="save" id="modalSave">Save</button>
 </div>
 </div>
 </div>

 <script src="../assets/js/supabase-config.js"></script>
 <script>
  (function () {
    'use strict';
    var db=null, currentUser=null;
    var state={ section:'bookings', filter:'all', rows:[] };
    var editing=null; // record being edited (or null for new)

    function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]; }); }
    function fmtDate(s){ if(!s) return '—'; var d=new Date(s);
      return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); }
    function fmtDT(s){ if(!s) return '—'; var d=new Date(s);
      return d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' · '+
             d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }
    function pill(s){ return '<span class="pill p-'+esc(s)+'">'+esc(s)+'</span>'; }
    function yn(b){ return b?'<span class="pill p-yes">yes</span>':'<span class="pill p-no">no</span>'; }
    function stars(n){ n=Math.max(0,Math.min(5,n||0));
      return '<span class="stars">'+'★'.repeat(n)+'<span style="color:#dfe3ea">'+'★'.repeat(5-n)+'</span></span>'; }
    function thumb(u){ if(u && !/^https?:|^\//.test(u)) u='../'+u;
      return u?'<img class="thumb" src="'+esc(u)+'" alt="" onerror="this.style.visibility=\'hidden\'">':'<div class="thumb"></div>'; }
    // up/down reorder cell — used by every sortable list (Doctors, Treatments, Blog)
    function orderCell(r){
      var idx=state.rows.indexOf(r), last=state.rows.length-1;
      var up='<button class="ordbtn" data-act="moveup" title="Move up"'+(idx<=0?' disabled':'')+'>&#9650;</button>';
      var dn='<button class="ordbtn" data-act="movedown" title="Move down"'+(idx>=last?' disabled':'')+'>&#9660;</button>';
      return '<td><div class="ord">'+up+'<span class="ordn">'+esc(r.sort_order)+'</span>'+dn+'</div></td>';
    }
    function waitForDB(){ return new Promise(function(r){
      if(window.HC&&window.HC.db) return r();
      document.addEventListener('hc:db-ready', r, {once:true}); setTimeout(r,4000); }); }

    // field helper
    function F(n,l,t,o){ o=o||{}; return {n:n,l:l,t:t||'text',req:o.req,opts:o.opts,hint:o.hint,ar:o.ar,pk:o.pk,full:o.full}; }

    var SECTIONS={
      // ── INBOX ──
      bookings:{ type:'inbox', table:'bookings', title:'Bookings', order:'created_at', asc:false,
        filters:[['all','All'],['new','New'],['confirmed','Confirmed'],['done','Done'],['cancelled','Cancelled']],
        cols:['Client','Treatment','Preferred','Received','Status','Actions'],
        row:function(r){ return '<td><div class="name">'+esc(r.full_name)+'</div><div class="sub">'+esc(r.phone)+

    async function load(){
      var cfg=SECTIONS[state.section];
      var content=document.getElementById('content');
      content.innerHTML='<div class="state">Loading…</div>';
      var q=db.from(cfg.table).select('*');
      if(state.section==='records' && state.patientCtx) q=q.eq('patient_id', state.patientCtx.id);
      q=q.order(cfg.order,{ascending:!!cfg.asc});
      if(cfg.type==='inbox' && state.filter!=='all') q=q.eq('status',state.filter);
      var res=await q;
      if(res.error){ content.innerHTML='<div class="err">Couldn\'t load '+esc(cfg.title)+': '+esc(res.error.message)+'</div>'; return; }
      state.rows=res.data||[]; render(); renderKpis(); if(cfg.type==='inbox') refreshBadges();
    }

    function render(){
      var cfg=SECTIONS[state.section], content=document.getElementById('content');
      if(!state.rows.length){
        content.innerHTML='<div class="state"><div class="big">Nothing here yet</div>'+
          (cfg.type==='collection'?'Click “Add new” to create the first one.':
            (state.filter==='all'?'New items from the website will appear here.':'No '+esc(state.filter)+' items.'))+'</div>';
        return;
      }
      var head='<tr>'+cfg.cols.map(function(c){return '<th>'+c+'</th>';}).join('')+'</tr>';
      var pk=cfg.pk||'id';
      var body=state.rows.map(function(r){
        var actions = cfg.type==='collection'
          ? '<td><div class="acts">'+(cfg.extraActions||'')+'<button class="btn edit" data-act="edit">Edit</button>'+
            '<button class="btn bad" data-act="delete">Delete</button></div></td>'
          : '';
        return '<tr data-id="'+esc(r[pk])+'">'+cfg.row(r)+actions+'</tr>';
      }).join('');
      content.innerHTML='<table><thead>'+head+'</thead><tbody>'+body+'</tbody></table>';
    }

    function renderKpis(){
      var cfg=SECTIONS[state.section], counts={};
      state.rows.forEach(function(r){ var k=cfg.type==='inbox'?r.status:(r.is_active?'active':(r.is_published?'published':'other'));
        counts[k]=(counts[k]||0)+1; });
      var items=[['Total',state.rows.length]];
      if(cfg.type==='inbox') cfg.filters.slice(1).forEach(function(f){ items.push([f[1],counts[f[0]]||0]); });
      else if(['doctors','treatments','blog_posts'].indexOf(cfg.table)>=0){
        var on=state.rows.filter(function(r){return r.is_active||r.is_published;}).length;
        items.push([cfg.table==='blog_posts'?'Published':'Active',on]); }
      document.getElementById('kpis').innerHTML=items.map(function(it){
        return '<div class="kpi"><div class="n">'+it[1]+'</div><div class="l">'+it[0]+'</div></div>'; }).join('');
    }

    async function refreshBadges(){
      [['bookings','new'],['messages','new'],['reviews','pending']].forEach(function(d){
        db.from(SECTIONS[d[0]].table).select('id',{count:'exact',head:true}).eq('status',d[1]).then(function(r){
          var el=document.getElementById('b-'+d[0]);
          if(!r.error&&r.count){ el.textContent=r.count; el.style.display='inline-block'; } else el.style.display='none'; }); });
    }

    function openEditor(record){
      var cfg=SECTIONS[state.section]; editing=record;
      document.getElementById('modalTitle').textContent=(record?'Edit ':'Add ')+cfg.title.replace(/s$/,'').toLowerCase();
      document.getElementById('formErr').textContent='';
      var rows='', buf=[];
      cfg.fields.forEach(function(f){
        var val=record?record[f.n]:'';
        var html=fieldHTML(f,val,!!record);
        if(f.t==='checkbox'||f.full){ if(buf.length){rows+='<div class="frow">'+buf.join('')+'</div>'; buf=[];} rows+=html; }
        else { buf.push(html); if(buf.length===2){ rows+='<div class="frow">'+buf.join('')+'</div>'; buf=[]; } }
      });
      if(buf.length) rows+='<div class="frow">'+buf.join('')+'</div>';
      var importPanel='';
      if(state.section==='doctors'){
        importPanel='<div class="import-panel"><strong>Import from file</strong>'+
          ' <span class="hint">— upload the profile as <b>.txt, .md or .docx</b>; the fields below fill in automatically. '+
          'Use labels: Name, Specialty, Tagline, Credentials, About.</span>'+
          '<div class="ip-row">'+
            '<label class="imp-lbl">English file<input type="file" accept=".txt,.md,.markdown,.docx,.doc" data-docimport="en"></label>'+
            '<label class="imp-lbl">Arabic file<input type="file" accept=".txt,.md,.markdown,.docx,.doc" data-docimport="ar"></label>'+
            '<span class="imp-status"></span></div></div>';
      }
      document.getElementById('modalBody').innerHTML=importPanel+rows;
      document.getElementById('overlay').classList.add('open');
    }
    function fieldHTML(f,val,isEdit){
      var cls='fld'+(f.full?' full':'')+(f.t==='checkbox'?' check':'');
      var id='f_'+f.n;
      var label='<label for="'+id+'">'+esc(f.l)+(f.req?' *':'')+(f.hint?' <span class="hint">— '+esc(f.hint)+'</span>':'')+'</label>';
      var arcls=f.ar?' ar':'';
      var dis=(f.pk&&isEdit)?' disabled':'';
      var input;
      if(f.t==='image'){
        var iv = (val && !/^https?:|^\//.test(val)) ? '../'+val : val;
        return '<div class="fld full"><label>'+esc(f.l)+(f.hint?' <span class="hint">— '+esc(f.hint)+'</span>':'')+'</label>'+
          '<div class="img-field">'+
            (val?'<img class="img-prev" src="'+esc(iv)+'" alt="">':'<div class="img-prev"></div>')+
            '<input type="file" accept="image/*" data-imgfile="'+f.n+'">'+
            '<input type="hidden" data-f="'+f.n+'" value="'+esc(val)+'">'+
            '<span class="img-status"></span></div></div>';
      }
      if(f.t==='multiselect'){
        var arr=Array.isArray(val)?val:(val?[val]:[]);
        var boxes=f.opts.map(function(o){
          return '<label style="display:inline-flex;align-items:center;gap:.4rem;margin:0 1rem .4rem 0;font-weight:400;color:var(--ink);font-size:.9rem">'+
            '<input type="checkbox" data-multi="'+f.n+'" value="'+esc(o)+'"'+(arr.indexOf(o)>=0?' checked':'')+
            ' style="width:16px;height:16px;accent-color:var(--gold)">'+esc(o)+'</label>';
        }).join('');
        return '<div class="fld'+(f.full?' full':'')+'"><label>'+esc(f.l)+
          (f.hint?' <span class="hint">— '+esc(f.hint)+'</span>':'')+
          '</label><div style="display:flex;flex-wrap:wrap;margin-top:.2rem">'+boxes+'</div></div>';
      }
      if(f.t==='textarea') input='<textarea id="'+id+'" data-f="'+f.n+'" class="'+arcls.trim()+'">'+esc(val)+'</textarea>';
      else if(f.t==='checkbox') return '<div class="'+cls+'"><input type="checkbox" id="'+id+'" data-f="'+f.n+'" '+(val?'checked':'')+'>'+label+'</div>';
      else if(f.t==='select'){ input='<select id="'+id+'" data-f="'+f.n+'"><option value="">—</option>'+
        f.opts.map(function(o){return '<option '+(val===o?'selected':'')+'>'+esc(o)+'</option>';}).join('')+'</select>'; }
      else if(f.t==='number') input='<input type="number" id="'+id+'" data-f="'+f.n+'" value="'+esc(val)+'">';
      else if(f.t==='date') input='<input type="date" id="'+id+'" data-f="'+f.n+'" value="'+esc(val?String(val).slice(0,10):'')+'">';
      else input='<input type="text" id="'+id+'" data-f="'+f.n+'" class="'+arcls.trim()+'" value="'+esc(val)+'"'+dis+'>';
      return '<div class="'+cls+'">'+label+input+'</div>';
    }
    function closeEditor(){ document.getElementById('overlay').classList.remove('open'); editing=null; }

    async function saveRecord(){
      var cfg=SECTIONS[state.section], pk=cfg.pk||'id';
      var saveBtn=document.getElementById('modalSave'), errEl=document.getElementById('formErr');
      var obj={};
      cfg.fields.forEach(function(f){
        if(f.t==='multiselect'){
          var picked=Array.prototype.slice.call(document.querySelectorAll('[data-multi="'+f.n+'"]:checked')).map(function(c){return c.value;});
          obj[f.n]=picked.length?picked:null; return;
        }
        var el=document.querySelector('[data-f="'+f.n+'"]'); if(!el) return;
        var v;
        if(f.t==='checkbox') v=el.checked;
        else if(f.t==='number'){ v=el.value===''?null:parseInt(el.value,10); }
        else { v=el.value.trim(); if(v==='') v=null; }
        obj[f.n]=v;
      });
      // validate required
      var missing=cfg.fields.filter(function(f){return f.req && (obj[f.n]==null||obj[f.n]==='');});
      if(missing.length){ errEl.textContent='Fill in: '+missing.map(function(f){return f.l;}).join(', '); return; }

      // departments: auto-link added ones to the dynamic styled page if no page_url is given
      if(state.section==='departments' && obj.slug && !obj.page_url){ obj.page_url='treatments/department.html?slug='+obj.slug; }

      saveBtn.disabled=true; saveBtn.textContent='Saving…'; errEl.textContent='';
      try{
        var res;
        if(editing){ var payload={}; Object.keys(obj).forEach(function(k){ if(k!==pk) payload[k]=obj[k]; });
          res=await db.from(cfg.table).update(payload).eq(pk, editing[pk]); }
        else {
          if(state.section==='records' && state.patientCtx) obj.patient_id=state.patientCtx.id;
          var clean={}; Object.keys(obj).forEach(function(k){ if(obj[k]!==null) clean[k]=obj[k]; });
          res=await db.from(cfg.table).insert(clean);
        }
        if(res.error){ errEl.textContent=res.error.message; return; }
        closeEditor(); load();
      } finally { saveBtn.disabled=false; saveBtn.textContent='Save'; }
    }

    async function doAction(id, act, v){
      var cfg=SECTIONS[state.section], pk=cfg.pk||'id';
      var row=state.rows.find(function(r){return String(r[pk])===String(id);});
      if(act==='edit'){ openEditor(row); return; }
      if(act==='records'){ state.patientCtx=row; switchSection('records'); return; }
      if(act==='moveup' || act==='movedown'){
        // swap this row with its neighbour, then renumber sort_order sequentially
        var list=state.rows.slice();
        var i=list.findIndex(function(r){return String(r[pk])===String(id);});
        var j=(act==='moveup')?i-1:i+1;
        if(i<0 || j<0 || j>=list.length) return;           // at an edge → nothing to do
        var t=list[i]; list[i]=list[j]; list[j]=t;          // swap positions
        for(var k=0;k<list.length;k++){
          if(list[k].sort_order!==k){
            var u=await db.from(cfg.table).update({sort_order:k}).eq(pk,list[k][pk]);
            if(u.error) return alert('Reorder failed: '+u.error.message);
          }
        }
        load(); return;
      }
      if(act==='delete'){
        if(!confirm('Delete this '+cfg.title.replace(/s$/,'').toLowerCase()+'? This can\'t be undone.')) return;
        var d=await db.from(cfg.table).delete().eq(pk,id); if(d.error) return alert('Delete failed: '+d.error.message);
      } else if(act==='status'){ var u=await db.from(cfg.table).update({status:v}).eq(pk,id); if(u.error) return alert('Update failed: '+u.error.message); }
      else if(act==='feature'){ var f=await db.from(cfg.table).update({is_featured:!row.is_featured}).eq(pk,id); if(f.error) return alert('Update failed: '+f.error.message); }
      load();
    }

    function switchSection(sec){
      state.section=sec; state.filter='all';
      if(sec==='services'){
        document.querySelectorAll('.nav-item[data-section]').forEach(function(n){ n.classList.toggle('active', n.dataset.section==='services'); });

    function ensureMammoth(){ return new Promise(function(res,rej){
      if(window.mammoth) return res();
      var s=document.createElement('script');
      s.src='https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js';
      s.onload=res; s.onerror=function(){rej(new Error('load failed'));}; document.head.appendChild(s); }); }
    function slugify(s){ return String(s).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,''); }
    function setF(name,val){ if(val==null||val==='') return; var el=document.querySelector('[data-f="'+name+'"]'); if(el) el.value=val; }
    var DOC_LABELS={name:'name',specialty:'specialty',title:'specialty',role:'specialty',
      tagline:'tagline',intro:'tagline',subtitle:'tagline',
      credentials:'credentials',qualifications:'credentials',highlights:'credentials',
      about:'about',bio:'about',biography:'about',profile:'about',overview:'about'};
    function parseDoctorDoc(text){
      var lines=String(text).replace(/\r/g,'').split('\n');
      var out={name:'',specialty:'',tagline:'',credentials:'',about:''}, buckets={}, cur=null, found=false;
      lines.forEach(function(line){
        var m=line.match(/^\s*([A-Za-z][A-Za-z /]{1,20})\s*[:：]\s*(.*)$/);
        var key=m?DOC_LABELS[m[1].trim().toLowerCase()]:null;
        if(key){ found=true; cur=key; buckets[cur]=buckets[cur]||''; if(m[2].trim()) buckets[cur]+=m[2].trim()+'\n'; }
        else if(cur){ buckets[cur]+=line+'\n'; }
      });
      if(!found){ out.about=String(text).trim(); return out; }
      ['name','specialty','tagline','credentials','about'].forEach(function(k){ if(buckets[k]) out[k]=buckets[k].trim(); });
      out.name=(out.name.split('\n')[0]||'').trim();
      out.specialty=(out.specialty.split('\n')[0]||'').trim();
      out.tagline=out.tagline.replace(/\n+/g,' ').trim();
      out.credentials=out.credentials.split('\n').map(function(l){return l.replace(/^[-*•\u2022\u25CF]\s*/,'').trim();}).filter(Boolean).join('\n');
      return out;
    }
    async function importDoctorDoc(file, lng, statusEl){
      statusEl.style.color=''; statusEl.textContent='Reading…';
      var text='';
      try{
        if(/\.docx?$/i.test(file.name)){
          await ensureMammoth();
          var ab=await file.arrayBuffer();
          text=(await window.mammoth.extractRawText({arrayBuffer:ab})).value||'';
        } else { text=await file.text(); }
      }catch(e){ statusEl.style.color='var(--red)'; statusEl.textContent='Could not read that file'; return; }
      var p=parseDoctorDoc(text), suf=(lng==='ar'?'_ar':'_en');
      setF('name'+suf,p.name); setF('specialty'+suf,p.specialty); setF('tagline'+suf,p.tagline);
      setF('credentials'+suf,p.credentials); setF('bio'+suf,p.about);
      if(lng==='en' && p.name){ var sl=document.querySelector('[data-f="slug"]'); if(sl && !sl.value) sl.value=slugify(p.name); }
      statusEl.style.color='var(--green)'; statusEl.textContent=(lng==='ar'?'Arabic':'English')+' imported ✓ — review & Save';
    }

    // ── image upload to Supabase Storage (auto-resized) ──
    function resizeImage(file, maxDim, quality){
      return new Promise(function(resolve){
        if(!/^image\//.test(file.type) || /gif|svg/.test(file.type)){ resolve(file); return; }
        var img=new Image(); var url=URL.createObjectURL(file);
        img.onload=function(){
          var w=img.naturalWidth, h=img.naturalHeight;
          if(Math.max(w,h)<=maxDim){ URL.revokeObjectURL(url); resolve(file); return; }
          var scale=maxDim/Math.max(w,h);
          var cv=document.createElement('canvas'); cv.width=Math.round(w*scale); cv.height=Math.round(h*scale);
          cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);
          cv.toBlob(function(blob){ URL.revokeObjectURL(url); resolve(blob||file); }, 'image/jpeg', quality);
        };
        img.onerror=function(){ URL.revokeObjectURL(url); resolve(file); };
        img.src=url;
      });
    }
    document.addEventListener('change', async function(e){
      var fi=e.target.closest('[data-imgfile]'); if(!fi) return;
      var file=fi.files&&fi.files[0]; if(!file) return;
      var wrap=fi.closest('.img-field');
      var hidden=wrap.querySelector('input[type=hidden][data-f]');
      var status=wrap.querySelector('.img-status');
      var prev=wrap.querySelector('.img-prev');
      status.className='img-status'; status.textContent='Optimizing…';
      try{
        var blob=await resizeImage(file, 1200, 0.82);
        status.textContent='Uploading…';
        var cfg=SECTIONS[state.section];
        var base=file.name.replace(/\.[^.]+$/,'').replace(/[^a-zA-Z0-9._-]/g,'_');
        var ext=(blob.type==='image/jpeg')?'jpg':(file.name.split('.').pop()||'img').toLowerCase();
        var path=cfg.table+'/'+Date.now()+'_'+base+'.'+ext;
        var up=await db.storage.from('images').upload(path,blob,{upsert:true,cacheControl:'3600',contentType:blob.type||file.type});
        if(up.error){ status.className='img-status bad'; status.textContent='Upload failed: '+up.error.message; return; }
        var url=db.storage.from('images').getPublicUrl(path).data.publicUrl;
        hidden.value=url;
        var nimg=document.createElement('img'); nimg.className='img-prev'; nimg.src=url; nimg.alt='';
        if(prev) prev.replaceWith(nimg);
        status.className='img-status ok'; status.textContent='Uploaded ✓';
      }catch(err){ status.className='img-status bad'; status.textContent='Upload error'; console.error(err); }
    });

    // Adds any built-in service that isn't in the `treatments` table yet.
    async function svcSyncBuiltin(existing){
      var have={}; (existing||[]).forEach(function(t){ if(t&&t.slug) have[t.slug]=1; });
      var changed=0;
      // 1) drop the old per-procedure surgery rows (they're one "Cosmetic Surgery" entry now)
      var stale=LEGACY_SERVICE_SLUGS.filter(function(s){ return have[s]; });
      if(stale.length){
        var del=await db.from('treatments').delete().in('slug',stale);
        if(!del.error){ changed+=stale.length; stale.forEach(function(s){ delete have[s]; }); }
      }
      // 2) add any built-in service that isn't in the table yet
      var missing=SITE_SERVICES.filter(function(s){ return !have[s.slug]; });
      if(missing.length){
        var ins=await db.from('treatments').insert(missing);
        if(ins.error){
          svcSyncNote='Could not add '+missing.length+' built-in service(s) automatically: '
            +esc(ins.error.message)+' — run <code>backend/migration-treatments-complete.sql</code> in Supabase, then reload.';
          return changed;
        }
        changed+=missing.length;
      }
      if(changed){
        svcSyncNote='Service list synced'
          +(missing.length?' — added '+missing.length+' built-in service(s)':'')
          +(stale.length?' — merged '+stale.length+' surgery procedures into one “Cosmetic Surgery” entry':'')+'.';
      }
      return changed;
    }

      var cmp=readList('compare'), faq=readList('faq'), rv=readList('reviews');
      var content={
        hero_image_url:k('hero_image_url'), ba_before_url:k('ba_before_url'), ba_after_url:k('ba_after_url'), video_id:k('video_id'),
        doctors: readList('doctors').filter(function(d){return d.name_en||d.name_ar;}),
        gallery: [].slice.call(box.querySelectorAll('.gurl')).map(function(i){return i.value;}).filter(Boolean),
        en:{ name:k('name_en'), tag1:k('tag1_en'),tag2:k('tag2_en'),tag3:k('tag3_en'), video_title:k('video_title_en'),video_note:k('video_note_en'),
          about_title:k('about_title_en'), about_short:k('about_short_en'), about_body:k('about_body_en'), benefits_title:k('benefits_title_en'),
          benefits:pairEN('benefits'), process:pairEN('process'), who:pairEN('who'), contra_intro:k('contra_intro_en'), contra:pairEN('contra'),
          tech:pairEN('tech'), compare:cmp.map(function(r){return {label:r.label_en,text:r.text_en};}).filter(function(x){return x.label||x.text;}),
          faq:faq.map(function(r){return {q:r.q_en,a:r.a_en};}).filter(function(x){return x.q;}), why:pairEN('why'),
          reviews:rv.map(function(r){return {text:r.text_en,name:r.name,meta:r.meta_en,date:r.date_en,rating:+r.rating||5};}).filter(function(x){return x.text;}),
          ba_cap1:k('ba_cap1_en'), ba_cap2:k('ba_cap2_en'), gallery_title:k('benefits_title_en')?'' : '' },
        ar:{ name:k('name_ar')||k('name_en'), tag1:k('tag1_ar'),tag2:k('tag2_ar'),tag3:k('tag3_ar'), video_title:k('video_title_ar'),video_note:k('video_note_ar'),
          about_title:k('about_title_ar'), about_short:k('about_short_ar'), about_body:k('about_body_ar'), benefits_title:k('benefits_title_ar'),
          benefits:pairAR('benefits'), process:pairAR('process'), who:pairAR('who'), contra_intro:k('contra_intro_ar'), contra:pairAR('contra'),
          tech:pairAR('tech'), compare:cmp.map(function(r){return {label:r.label_ar,text:r.text_ar};}).filter(function(x){return x.label||x.text;}),
          faq:faq.map(function(r){return {q:r.q_ar,a:r.a_ar};}).filter(function(x){return x.q;}), why:pairAR('why'),
          reviews:rv.map(function(r){return {text:r.text_ar,name:r.name,meta:r.meta_ar,date:r.date_ar,rating:+r.rating||5};}).filter(function(x){return x.text;}),
          ba_cap1:k('ba_cap1_ar'), ba_cap2:k('ba_cap2_ar'), gallery_title:'' }
      };
      // gallery titles
      content.en.gallery_title=(k('name_en')+' Gallery'); content.ar.gallery_title=(k('name_ar')||k('name_en'))+' — معرض';
      var payload={ slug:slug, category:k('category'), name_en:k('name_en'), name_ar:k('name_ar'), hero_image_url:k('hero_image_url'),
        content:content, is_active:(k('is_active')!=='false') };
      msg.textContent='Saving…';
      var res;
      if(svcEditing){ res=await db.from('service_pages').update(payload).eq('id',svcEditing.id); }
      else{ res=await db.from('service_pages').insert(payload); }
      if(res.error){ msg.className='svc-msg bad'; msg.textContent='Save failed: '+res.error.message; return; }
      // also upsert a listing card in `treatments` so it appears in catalogue pages
      try{
        await db.from('treatments').upsert({ slug:slug, category:k('category'), parent_slug:k('category'),
          name_en:k('name_en'), name_ar:k('name_ar'), tagline_en:k('tag1_en'), tagline_ar:k('tag1_ar'),
          description_en:k('about_short_en'), description_ar:k('about_short_ar'), image_url:k('hero_image_url'),
          page_url:'treatments/service.html?slug='+slug, is_active:(k('is_active')!=='false') }, { onConflict:'slug' });
      }catch(e){ /* listing is best-effort */ }
      msg.className='svc-msg ok'; msg.textContent='Saved ✓ Published at /treatments/service.html?slug='+slug;
      setTimeout(svcLoadList, 900);
    }

    // service-images upload (single fields + gallery)
    document.addEventListener('change', async function(e){
      var single=e.target.closest('[data-svcfile]'); var galInput=e.target.closest('[data-svcgallery]');
      if(!single && !galInput) return;
      var fi=single||galInput; var file=fi.files&&fi.files[0]; if(!file) return;
      var boxEl=fi.closest('.svc-img'); var st=boxEl.querySelector('.st'); st.className='st'; st.textContent='Optimizing…';
      try{
        var blob=await resizeImage(file, 1400, 0.82);
        st.textContent='Uploading…';
        var base=file.name.replace(/\.[^.]+$/,'').replace(/[^a-zA-Z0-9._-]/g,'_');
        var ext=(blob.type==='image/jpeg')?'jpg':(file.name.split('.').pop()||'img').toLowerCase();
        var path='services/'+Date.now()+'_'+base+'.'+ext;
        var up=await db.storage.from('service-images').upload(path,blob,{upsert:true,cacheControl:'3600',contentType:blob.type||file.type});
        if(up.error){ st.className='st bad'; st.textContent='Upload failed: '+up.error.message; return; }
        var url=db.storage.from('service-images').getPublicUrl(path).data.publicUrl;
        if(galInput){ addGalleryThumb(url); fi.value=''; st.className='st ok'; st.textContent='Added ✓'; }
        else{ boxEl.querySelector('[data-k]').value=url; var im=boxEl.querySelector('img'); im.src=url; im.style.display='block'; st.className='st ok'; st.textContent='Uploaded ✓'; }
      }catch(err){ st.className='st bad'; st.textContent='Upload error'; console.error(err); }
    });

    // service form clicks (add row / remove / save / cancel / edit / delete / add new)
    document.addEventListener('click', async function(e){
      var add=e.target.closest('[data-add]');
      if(add){ var id=add.getAttribute('data-add'); var cols=colsFor(id); var grid=document.getElementById('svc-l-'+id).getAttribute('data-grid')||'pair'; document.getElementById('svc-l-'+id).insertAdjacentHTML('beforeend', svcRowHtml(cols,grid,{})); return; }
      var rm=e.target.closest('[data-rm]'); if(rm){ var row=rm.closest('.svc-row'); if(row) row.remove(); return; }
      var rmt=e.target.closest('[data-rmthumb]'); if(rmt){ var t=rmt.closest('.svc-img'); if(t) t.remove(); return; }
      if(e.target.id==='svcAddNew'){ openServiceForm(null); return; }
      if(e.target.id==='svcSave'){ svcSave(); return; }
      if(e.target.id==='svcCancelForm'){ svcLoadList(); return; }
      // ── reorder a service: swap with its neighbour, then renumber sort_order 0..n ──
      var mv=e.target.closest('[data-svcmove]');
      if(mv){
        var kind=mv.getAttribute('data-svcmove');
        var i=parseInt(mv.getAttribute('data-i'),10), dir=parseInt(mv.getAttribute('data-dir'),10);
        var list=(kind==='added'?svcAdded:svcBuiltin).slice();
        var tbl=(kind==='added'?'service_pages':'treatments');
        var j=i+dir;
        if(i<0 || j<0 || j>=list.length) return;
        var tmp=list[i]; list[i]=list[j]; list[j]=tmp;
        mv.disabled=true;
        for(var k=0;k<list.length;k++){
          if(list[k].sort_order!==k){
            var up=await db.from(tbl).update({sort_order:k}).eq('id',list[k].id);
            if(up.error){ alert('Reorder failed: '+up.error.message); return; }
          }
        }
        svcLoadList(); return;
      }
      var ed=e.target.closest('[data-svcedit]'); if(ed){ var r=await db.from('service_pages').select('*').eq('id',ed.getAttribute('data-svcedit')).single(); if(!r.error) openServiceForm(r.data); return; }
      var tg=e.target.closest('[data-svctoggle]'); if(tg){ var slug=tg.getAttribute('data-svctoggle'); var to=tg.getAttribute('data-to')==='1';
        tg.disabled=true; var u=await db.from('treatments').update({is_active:to}).eq('slug',slug);
        if(u.error){ alert('Update failed: '+u.error.message); tg.disabled=false; return; } svcLoadList(); return; }
      var del=e.target.closest('[data-svcdel]'); if(del){ if(!confirm('Delete “'+del.getAttribute('data-slug')+'”? This removes the live page.')) return;
        var d=await db.from('service_pages').delete().eq('id',del.getAttribute('data-svcdel')); if(d.error){ alert('Delete failed: '+d.error.message); return; }
        try{ await db.from('treatments').delete().eq('slug',del.getAttribute('data-slug')); }catch(e2){}
        svcLoadList(); return; }
    });

    (async function(){
      await waitForDB();
      if(!window.HC||!window.HC.db){ document.getElementById('gate').innerHTML=
        'Connection not ready.<br>Set the anon key in supabase-config.js, then reload.'; return; }
      db=window.HC.db;
      var u=await window.HC.auth.user();
      if(!u||!u.data||!u.data.user){ window.location.href='login.html'; return; }
      var isAdmin=await window.HC.auth.isAdmin();
      if(!isAdmin){ await window.HC.auth.signOut(); window.location.href='login.html'; return; }
      currentUser=u.data.user;
      document.getElementById('whoEmail').textContent=currentUser.email||'—';
      document.getElementById('gate').style.display='none';
      document.getElementById('rail').style.display='flex';
      document.getElementById('main').style.display='block';
      switchSection('bookings');
    })();
  })();
  </script>
</body>
</html>
